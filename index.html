    const professionOptions = ["Engenheiro", "Professor", "Estilista", "Aventureiro"];
    const specializationOptions = {
      Engenheiro: ["Mecânico", "Hacker", "Sem especialização"],
      Professor: ["Alquimista", "Acadêmico", "Sem especialização"],
      Estilista: ["Decorador", "Designer", "Sem especialização"],
      Aventureiro: ["Cozinheiro", "Arqueólogo", "Sem especialização"]
    };

    let state = {
      collapsed: false,
      sidebarWidth: 292,
      selectedId: null,
      characters: [],
      routineTasks: [],
      routineCompletions: {},
      showRoutineOnCharacters: false,
      quests: [],
      questProgress: {},
      selectedQuestId: null,
      selectedQuestCharacterId: null
    };

    let editingId = null;
    let editingTaskId = null;
    let editingQuestId = null;
    let expandedQuestId = null;

    function clampNumber(value, min, max) {
      if (value === "" || value === null || value === undefined) return null;
      const number = Number(value);
      if (!Number.isFinite(number)) return min;
      return Math.min(max, Math.max(min, Math.round(number)));
    }

    function hasValue(value) {
      return value !== "" && value !== null && value !== undefined;
    }

    function normalizeRoutineTask(task) {
      return {
        id: task.id || `task:${Date.now()}:${Math.random().toString(16).slice(2)}`,
        name: task.name || "Nova tarefa",
        kind: routineKinds[task.kind] ? task.kind : "daily",
        durationHours: clampNumber(task.durationHours, 1, 8760),
        minLevel: clampNumber(task.minLevel, 1, 625) || 1,
        minNwLevel: hasValue(task.minNwLevel) ? clampNumber(task.minNwLevel, 1, 100) : "",
        professions: Array.isArray(task.professions) ? task.professions.filter((item) => professionOptions.includes(item)) : [],
        showOnCharacters: Boolean(task.showOnCharacters),
        defaultTask: Boolean(task.defaultTask)
      };
    }

    function normalizeQuestSection(section = {}) {
      return {
        id: section.id || `section:${Date.now()}:${Math.random().toString(16).slice(2)}`,
        title: section.title || "Nova seção",
        text: section.text || "",
        coordinates: Array.isArray(section.coordinates) ? section.coordinates.filter(Boolean).map(String) : []
      };
    }

    function normalizeQuest(quest = {}) {
      const sections = Array.isArray(quest.sections) ? quest.sections.map(normalizeQuestSection) : [];
      return {
        id: quest.id || `quest:${Date.now()}:${Math.random().toString(16).slice(2)}`,
        name: quest.name || "Nova quest",
        minLevel: clampNumber(quest.minLevel, 1, 625) || 1,
        minNwLevel: hasValue(quest.minNwLevel) ? clampNumber(quest.minNwLevel, 1, 100) : "",
        sections: sections.length ? sections : [normalizeQuestSection({ title: "Início", text: "" })],
        createdAt: quest.createdAt || Date.now()
      };
    }

    function normalizeQuests(quests = []) {
      return Array.isArray(quests) ? quests.map(normalizeQuest) : [];
    }

    function mergeRoutineTasks(tasks = []) {
      const byId = new Map(defaultRoutineTasks.map((task) => [task.id, normalizeRoutineTask(task)]));
      tasks.map(normalizeRoutineTask).forEach((task) => byId.set(task.id, task));
      return [...byId.values()];
    }

    function normalizeCharacters(characters) {
      const normalized = characters.map(normalizeCharacter);
      if (normalized.every((character) => character.order !== null)) {
        return normalized;
      }

      return [...normalized]
        .sort((a, b) => b.characterLevel - a.characterLevel)
        .map((character, index) => ({ ...character, order: index }));
    }

    function getOrderedCharacters() {
      return [...state.characters].sort((a, b) => {
        if (a.order !== b.order) return a.order - b.order;
        return b.characterLevel - a.characterLevel;
      });
    }

    function getNextOrder() {
      if (!state.characters.length) return 0;
      return Math.min(...state.characters.map((character) => character.order ?? 0)) - 1;
    }

    function getLevelColor(level) {
      const numericLevel = Number(level) || 0;
      const tier = levelTiers.find((item, index) => {
        const isLast = index === levelTiers.length - 1;
        return numericLevel >= item.min && (isLast ? numericLevel <= item.max : numericLevel < item.max);
      });
      return tier?.color || "var(--line)";
    }

    function applyLevelBorder(element, level) {
      element.style.setProperty("--level-color", getLevelColor(level));
    }

    function nextDailyReset(from = new Date()) {
      const next = new Date(from);
      next.setHours(7, 45, 0, 0);
      if (next <= from) next.setDate(next.getDate() + 1);
      return next.getTime();
    }

    function nextWeeklyReset(from = new Date()) {
      const next = new Date(from);
      next.setHours(7, 45, 0, 0);
      const daysUntilMonday = (8 - next.getDay()) % 7;
      next.setDate(next.getDate() + daysUntilMonday);
      if (next <= from) next.setDate(next.getDate() + 7);
      return next.getTime();
    }

    function nextMonthlyReset(from = new Date()) {
      const next = new Date(from.getFullYear(), from.getMonth(), 1, 7, 45, 0, 0);
      if (next <= from) next.setMonth(next.getMonth() + 1);
      return next.getTime();
    }

    function getTaskUnlockAt(task, from = new Date()) {
      if (task.kind === "daily") return nextDailyReset(from);
      if (task.kind === "weekly") return nextWeeklyReset(from);
      if (task.kind === "monthly") return nextMonthlyReset(from);
      return from.getTime() + (Number(task.durationHours) || 24) * 60 * 60 * 1000;
    }

    function getCompletionKey(taskId, characterId) {
      return `${taskId}::${characterId}`;
    }

    function isCharacterEligibleForTask(character, task) {
      if ((Number(character.characterLevel) || 1) < (Number(task.minLevel) || 1)) return false;
      if (hasValue(task.minNwLevel) && (Number(character.nwLevel) || 0) < Number(task.minNwLevel)) return false;
      if (task.professions.length && !task.professions.includes(character.profession)) return false;
      return true;
    }

    function isCharacterEligibleForQuest(character, quest) {
      if ((Number(character.characterLevel) || 1) < (Number(quest.minLevel) || 1)) return false;
      if (hasValue(quest.minNwLevel) && (Number(character.nwLevel) || 0) < Number(quest.minNwLevel)) return false;
      return true;
    }

    function getQuestProgressKey(questId, characterId) {
      return `${questId}::${characterId}`;
    }

    function getQuestProgress(questId, characterId) {
      return state.questProgress[getQuestProgressKey(questId, characterId)] || null;
    }

    function setQuestProgress(questId, characterId, patch) {
      const key = getQuestProgressKey(questId, characterId);
      state.questProgress[key] = {
        status: "started",
        completedSections: [],
        startedAt: Date.now(),
        ...state.questProgress[key],
        ...patch,
        updatedAt: Date.now()
      };
    }

    function getCompletion(taskId, characterId) {
      const completion = state.routineCompletions[getCompletionKey(taskId, characterId)];
      if (!completion || Number(completion.unlockAt) <= Date.now()) return null;
      return completion;
    }

    function formatRemaining(unlockAt) {
      const ms = Math.max(0, Number(unlockAt) - Date.now());
      const totalMinutes = Math.ceil(ms / 60000);
      const days = Math.floor(totalMinutes / 1440);
      const hours = Math.floor((totalMinutes % 1440) / 60);
      const minutes = totalMinutes % 60;
      if (days) return `${days}d ${hours}h ${minutes}m`;
      if (hours) return `${hours}h ${minutes}m`;
      return `${minutes}m`;
    }

    function formatDaysHours(ms) {
      const totalHours = Math.max(0, Math.ceil(ms / (60 * 60 * 1000)));
      const days = Math.floor(totalHours / 24);
      const hours = totalHours % 24;
      if (days && hours) return `${days}d ${hours}h`;
      if (days) return `${days}d`;
      return `${hours}h`;
    }

    function getTaskResetLabel(task) {
      if (task.kind === "custom") {
        return `Reset em ${formatDaysHours((Number(task.durationHours) || 24) * 60 * 60 * 1000)} após marcar`;
      }
      return `Reset em ${formatDaysHours(getTaskUnlockAt(task) - Date.now())}`;
    }

    function clearExpiredRoutineCompletions() {
      let changed = false;
      Object.entries(state.routineCompletions).forEach(([key, completion]) => {
        if (!completion || Number(completion.unlockAt) <= Date.now()) {
          delete state.routineCompletions[key];
          changed = true;
        }
      });
      if (changed) saveState();
    }

    function getAvailableRoutineCount(characterId) {
      return state.routineTasks.filter((task) => {
        const character = state.characters.find((item) => item.id === characterId);
        return character && task.showOnCharacters && isCharacterEligibleForTask(character, task) && !getCompletion(task.id, characterId);
      }).length;
    }

    function getAvailableRoutineNames(character) {
      return state.routineTasks
        .filter((task) => task.showOnCharacters && isCharacterEligibleForTask(character, task) && !getCompletion(task.id, character.id))
        .map((task) => task.name);
    }

    function buildClanInline(clan) {
      const wrapper = document.createElement("span");
      wrapper.className = "clan-inline";

      const icon = document.createElement("img");
      icon.className = "clan-icon";
      icon.alt = "";
      icon.loading = "lazy";
      if (clanIcons[clan]) {
        icon.src = clanIcons[clan];
      }

      const name = document.createElement("span");
      name.textContent = clan;

      if (clanIcons[clan]) wrapper.appendChild(icon);
      wrapper.appendChild(name);
      return wrapper;
    }

    function renderClanPreview(clan) {
      clanPreview.innerHTML = "";
      clanPreview.appendChild(buildClanInline(clan));
    }

    function normalizeCharacter(character) {
      const professionName = professionOptions.includes(character.profession) ? character.profession : "";
      const availableSpecs = professionName ? specializationOptions[professionName] : [];
      const spec = professionName && availableSpecs.includes(character.specialization) ? character.specialization : "";

      return {
        id: character.id || String(Date.now()),
        name: character.name || "Sem nome",
        clan: clanOptions.includes(character.clan) ? character.clan : character.className && clanOptions.includes(character.className) ? character.className : "Naturia",
        characterLevel: clampNumber(character.characterLevel || character.level || 1, 1, 625) || 1,
        nwLevel: clampNumber(character.nwLevel, 1, 100),
        profession: professionName,
        specialization: spec,
        professionLevel: clampNumber(character.professionLevel, 1, 120),
        order: Number.isFinite(Number(character.order)) ? Number(character.order) : null,
        createdAt: character.createdAt || Date.now()
      };
    }

    function loadState() {
      const saved = localStorage.getItem(STORAGE_KEY) || localStorage.getItem(PREVIOUS_STORAGE_KEY) || localStorage.getItem(LEGACY_STORAGE_KEY);
      if (!saved) return;

      try {
        const parsed = JSON.parse(saved);
        state = {
          collapsed: Boolean(parsed.collapsed),
          sidebarWidth: clampNumber(parsed.sidebarWidth || 292, 236, 460) || 292,
          selectedId: parsed.selectedId || null,
          characters: Array.isArray(parsed.characters) ? normalizeCharacters(parsed.characters) : [],
          routineTasks: mergeRoutineTasks(parsed.routineTasks),
          routineCompletions: parsed.routineCompletions && typeof parsed.routineCompletions === "object" ? parsed.routineCompletions : {},
          showRoutineOnCharacters: Boolean(parsed.showRoutineOnCharacters),
          quests: normalizeQuests(parsed.quests),
          questProgress: parsed.questProgress && typeof parsed.questProgress === "object" ? parsed.questProgress : {},
          selectedQuestId: parsed.selectedQuestId || null,
          selectedQuestCharacterId: parsed.selectedQuestCharacterId || null
        };
      } catch {
        localStorage.removeItem(STORAGE_KEY);
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function createCharacterFromForm(id = String(Date.now())) {
      return normalizeCharacter({
        id,
        name: characterName.value.trim() || "Sem nome",
        clan: characterClan.value,
        characterLevel: characterLevel.value,
        nwLevel: nwLevel.value,
        profession: profession.value,
        specialization: specialization.value,
        professionLevel: professionLevel.value,
        order: state.characters.find((character) => character.id === id)?.order ?? getNextOrder(),
        createdAt: state.characters.find((character) => character.id === id)?.createdAt || Date.now()
      });
    }

    function setSelectOptions(select, options, selectedValue) {
      select.innerHTML = "";
      select.add(new Option("Não informado", "", false, !selectedValue));
      options.forEach((option) => {
        select.add(new Option(option, option, false, option === selectedValue));
      });
    }

    function refreshSpecializations(selectedValue) {
      const options = specializationOptions[profession.value] || [];
      const nextSelected = options.includes(selectedValue) ? selectedValue : "";
      setSelectOptions(specialization, options, nextSelected);
      specialization.disabled = !profession.value;
    }

    function openModal(character = null) {
      editingId = character?.id || null;
      modalTitle.textContent = editingId ? "Editar personagem" : "Adicionar personagem";
      deleteFromModalButton.style.display = editingId ? "inline-flex" : "none";

      const draft = normalizeCharacter(character || {});
      characterName.value = editingId ? draft.name : "";
      characterLevel.value = draft.characterLevel;
      nwLevel.value = hasValue(draft.nwLevel) ? draft.nwLevel : "";
      professionLevel.value = hasValue(draft.professionLevel) ? draft.professionLevel : "";
      setSelectOptions(characterClan, clanOptions, draft.clan);
      setSelectOptions(profession, professionOptions, draft.profession);
      renderClanPreview(characterClan.value);
      refreshSpecializations(draft.specialization);

      modalBackdrop.classList.add("open");
      document.body.style.overflow = "hidden";
      characterName.focus();
    }

    function closeModal() {
      modalBackdrop.classList.remove("open");
      document.body.style.overflow = "";
      editingId = null;
      characterForm.reset();
    }

    function removeCharacter(id) {
      const character = state.characters.find((item) => item.id === id);
      const label = character ? character.name : "este personagem";
      if (!confirm(`Remover ${label}?`)) return;

      state.characters = state.characters.filter((item) => item.id !== id);
      if (state.selectedId === id) {
        state.selectedId = state.characters[0]?.id || null;
      }
      saveState();
      closeModal();
      render();
    }

    function updateCharacter(id, patch) {
      state.characters = state.characters.map((character) => {
        if (character.id !== id) return character;
        return normalizeCharacter({ ...character, ...patch });
      });
      saveState();
      render();
    }

    function reorderCharacter(draggedId, targetId) {
      if (!draggedId || !targetId || draggedId === targetId) return;
      const ordered = getOrderedCharacters();
      const draggedIndex = ordered.findIndex((character) => character.id === draggedId);
      const targetIndex = ordered.findIndex((character) => character.id === targetId);
      if (draggedIndex < 0 || targetIndex < 0) return;

      const [dragged] = ordered.splice(draggedIndex, 1);
      ordered.splice(targetIndex, 0, dragged);
      const orderById = new Map(ordered.map((character, index) => [character.id, index]));
      state.characters = state.characters.map((character) => ({
        ...character,
        order: orderById.get(character.id)
      }));
      saveState();
      render();
    }

    function adjustCharacterLevel(id, field, delta) {
      const character = state.characters.find((item) => item.id === id);
      if (!character) return;
      const max = field === "characterLevel" ? 625 : 100;
      updateCharacter(id, { [field]: clampNumber(Number(character[field]) + delta, 1, max) });
    }

    function selectCharacter(id) {
      state.selectedId = id;
      saveState();
      render();
      document.querySelector(`[data-card-id="${id}"]`)?.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function renderList() {
      list.innerHTML = "";

      const orderedCharacters = getOrderedCharacters();

      orderedCharacters.forEach((character) => {
        const item = document.createElement("div");
        item.className = `nav-card${character.id === state.selectedId ? " active" : ""}`;
        item.title = character.name;
        applyLevelBorder(item, character.characterLevel);

        const select = document.createElement("button");
        select.className = "nav-card-main";
        select.type = "button";
        select.setAttribute("aria-label", `Selecionar ${character.name}`);
        select.addEventListener("click", () => selectCharacter(character.id));

        const text = document.createElement("span");
        text.className = "nav-text";
        text.innerHTML = `<strong></strong><span></span>`;
        text.querySelector("strong").textContent = character.name;
        const navDetail = text.querySelector("span");
        navDetail.appendChild(buildClanInline(character.clan));
        navDetail.append(` · Nv. ${character.characterLevel}${hasValue(character.nwLevel) ? ` · NW ${character.nwLevel}` : ""}`);

        const characterControls = document.createElement("div");
        characterControls.className = "level-controls";
        characterControls.setAttribute("aria-label", `Alterar nível de ${character.name}`);
        characterControls.innerHTML = `
          <button class="level-button" type="button" aria-label="Aumentar nível do personagem">+</button>
          <button class="level-button" type="button" aria-label="Diminuir nível do personagem">-</button>
        `;
        const [increaseCharacter, decreaseCharacter] = characterControls.querySelectorAll("button");
        increaseCharacter.addEventListener("click", () => adjustCharacterLevel(character.id, "characterLevel", 1));
        decreaseCharacter.addEventListener("click", () => adjustCharacterLevel(character.id, "characterLevel", -1));

        const nwControls = document.createElement("div");
        nwControls.className = "level-controls nw";
        nwControls.setAttribute("aria-label", `Alterar nível NW de ${character.name}`);
        nwControls.innerHTML = `
          <button class="level-button" type="button" aria-label="Aumentar nível NW">+</button>
          <button class="level-button" type="button" aria-label="Diminuir nível NW">-</button>
        `;
        const [increaseNw, decreaseNw] = nwControls.querySelectorAll("button");
        increaseNw.addEventListener("click", () => adjustCharacterLevel(character.id, "nwLevel", 1));
        decreaseNw.addEventListener("click", () => adjustCharacterLevel(character.id, "nwLevel", -1));

        select.append(text);
        item.append(select, characterControls, nwControls);
        list.appendChild(item);
      });
    }

    function renderCards() {
      grid.innerHTML = "";

      if (!state.characters.length) {
        grid.appendChild(emptyTemplate.content.cloneNode(true));
        return;
      }

      const orderedCharacters = getOrderedCharacters();

      orderedCharacters.forEach((character) => {
        const card = document.createElement("article");
        card.className = "character-card";
        card.dataset.cardId = character.id;
        card.draggable = false;
        applyLevelBorder(card, character.characterLevel);

        const professionDisplay = character.profession
          ? `${character.profession}${hasValue(character.professionLevel) ? ` (${character.professionLevel})` : ""}`
          : "";
        const facts = [
          { label: "Clã", value: character.clan, highlight: true },
          { label: "Nível personagem", value: character.characterLevel },
          { label: "Nível NW", value: character.nwLevel },
          { label: "Profissão", value: professionDisplay },
          { label: "Especialização", value: character.specialization }
        ].filter((fact) => hasValue(fact.value));

        card.innerHTML = `
          <div class="card-header">
            <div class="card-title">
              <strong></strong>
            </div>
            <button class="drag-button" type="button" aria-label="Mover card livremente" title="Mover card livremente">✥</button>
            <button class="edit-button" type="button" aria-label="Editar personagem" title="Editar personagem">✎</button>
          </div>
          <div class="card-facts"></div>
        `;

        card.querySelector(".card-title strong").textContent = character.name;
        const availableRoutineNames = getAvailableRoutineNames(character);
        if (availableRoutineNames.length) {
          const badgeList = document.createElement("div");
          badgeList.className = "routine-badge-list";
          availableRoutineNames.forEach((name) => {
            const badge = document.createElement("span");
            badge.className = "routine-badge";
            badge.textContent = name;
            badgeList.appendChild(badge);
          });
          card.querySelector(".card-title").appendChild(badgeList);
        }
        const factsContainer = card.querySelector(".card-facts");
        facts.forEach((fact) => {
          const row = document.createElement("div");
          row.className = `fact${fact.highlight ? " highlight" : ""}`;
          row.innerHTML = `<span></span><strong></strong>`;
          row.querySelector("span").textContent = fact.label;
          if (fact.label === "Clã") {
            row.querySelector("strong").appendChild(buildClanInline(fact.value));
          } else {
            row.querySelector("strong").textContent = fact.value;
          }
          factsContainer.appendChild(row);
        });

        const dragButton = card.querySelector(".drag-button");
        dragButton.addEventListener("pointerdown", () => {
          card.draggable = true;
        });
        dragButton.addEventListener("pointerup", () => {
          card.draggable = false;
        });
        card.addEventListener("dragstart", (event) => {
          event.dataTransfer.setData("text/plain", character.id);
          event.dataTransfer.effectAllowed = "move";
          card.classList.add("dragging");
        });
        card.addEventListener("dragend", () => {
          card.draggable = false;
          card.classList.remove("dragging");
          document.querySelectorAll(".drop-target").forEach((target) => target.classList.remove("drop-target"));
        });
        card.addEventListener("dragover", (event) => {
          event.preventDefault();
          if (!card.classList.contains("dragging")) {
            card.classList.add("drop-target");
          }
        });
        card.addEventListener("dragleave", () => {
          card.classList.remove("drop-target");
        });
        card.addEventListener("drop", (event) => {
          event.preventDefault();
          card.classList.remove("drop-target");
          reorderCharacter(event.dataTransfer.getData("text/plain"), character.id);
        });
        card.querySelector(".edit-button").addEventListener("click", () => {
          state.selectedId = character.id;
          saveState();
          render();
          openModal(character);
        });

        grid.appendChild(card);
      });
    }

    function renderStats() {
      editSelectedButton.disabled = !state.selectedId;
    }

    function renderProfessionChoices(selected = []) {
      taskProfessionGrid.innerHTML = "";
      professionOptions.forEach((professionName) => {
        const label = document.createElement("label");
        label.innerHTML = `<input type="checkbox" value=""><span></span>`;
        const checkbox = label.querySelector("input");
        checkbox.value = professionName;
        checkbox.checked = selected.includes(professionName);
        label.querySelector("span").textContent = professionName;
        taskProfessionGrid.appendChild(label);
      });
    }

    function openTaskModal(task = null) {
      editingTaskId = task?.id || null;
      const draft = normalizeRoutineTask(task || { kind: "daily" });
      taskModalTitle.textContent = editingTaskId ? "Editar Tarefa" : "Adicionar Tarefa";
      taskName.value = editingTaskId ? draft.name : "";
      taskKind.value = draft.kind;
      taskMinLevel.value = draft.minLevel || 1;
      taskMinNwLevel.value = hasValue(draft.minNwLevel) ? draft.minNwLevel : "";
      taskShowOnCharacters.checked = Boolean(draft.showOnCharacters);
      taskDurationDays.value = draft.kind === "custom" ? Math.floor((Number(draft.durationHours) || 24) / 24) : "";
      taskDurationHours.value = draft.kind === "custom" ? (Number(draft.durationHours) || 24) % 24 : "";
      taskDurationRow.style.display = taskKind.value === "custom" ? "grid" : "none";
      taskName.disabled = Boolean(draft.defaultTask);
      taskKind.disabled = Boolean(draft.defaultTask);
      taskDurationDays.disabled = Boolean(draft.defaultTask);
      taskDurationHours.disabled = Boolean(draft.defaultTask);
      deleteTaskButton.style.display = editingTaskId && !draft.defaultTask ? "inline-flex" : "none";
      renderProfessionChoices(draft.professions);
      taskModalBackdrop.classList.add("open");
      document.body.style.overflow = "hidden";
      taskName.focus();
    }

    function closeTaskModal() {
      taskModalBackdrop.classList.remove("open");
      document.body.style.overflow = "";
      editingTaskId = null;
      taskForm.reset();
    }

    function getTaskFromForm() {
      const existing = state.routineTasks.find((task) => task.id === editingTaskId);
      const selectedProfessions = [...taskProfessionGrid.querySelectorAll("input:checked")].map((input) => input.value);
      const kind = existing?.defaultTask ? existing.kind : taskKind.value;
      const days = Number(taskDurationDays.value) || 0;
      const hours = Number(taskDurationHours.value) || 0;
      return normalizeRoutineTask({
        id: editingTaskId || `task:${Date.now()}:${Math.random().toString(16).slice(2)}`,
        name: existing?.defaultTask ? existing.name : taskName.value.trim(),
        kind,
        durationHours: kind === "custom" ? Math.max(1, days * 24 + hours) : existing?.durationHours,
        minLevel: taskMinLevel.value,
        minNwLevel: taskMinNwLevel.value,
        professions: selectedProfessions,
        showOnCharacters: taskShowOnCharacters.checked,
        defaultTask: Boolean(existing?.defaultTask)
      });
    }

    function renderRoutineSections() {
      clearExpiredRoutineCompletions();
      routineSections.innerHTML = "";

      Object.entries(routineKinds).forEach(([kind, config]) => {
        const section = document.createElement("section");
        section.className = "routine-section";
        section.innerHTML = `
          <div class="routine-section-header">
            <div>
              <h2>${config.title}</h2>
              <span>${config.reset}</span>
            </div>
          </div>
          <div class="routine-grid"></div>
        `;

        const gridEl = section.querySelector(".routine-grid");
        state.routineTasks.filter((task) => task.kind === kind).forEach((task) => {
          const eligibleCharacters = getOrderedCharacters().filter((character) => isCharacterEligibleForTask(character, task));
          const anyAvailable = eligibleCharacters.some((character) => !getCompletion(task.id, character.id));
          const taskCard = document.createElement("article");
          taskCard.className = `task-card${anyAvailable ? " available" : ""}`;
          taskCard.innerHTML = `
            <header>
              <div class="task-heading">
                <h3></h3>
                <span></span>
              </div>
              <button class="task-edit-button" type="button" aria-label="Editar tarefa" title="Editar tarefa">✎</button>
            </header>
            <div class="task-characters"></div>
          `;
          taskCard.querySelector("h3").textContent = task.name;
          taskCard.querySelector(".task-heading span").textContent = getTaskResetLabel(task);
          taskCard.querySelector(".task-edit-button").addEventListener("click", () => openTaskModal(task));

          const rows = taskCard.querySelector(".task-characters");
          if (!eligibleCharacters.length) {
            rows.innerHTML = '<div class="task-timer">Nenhum personagem elegível para esta tarefa.</div>';
          }
          eligibleCharacters.forEach((character) => {
            const completion = getCompletion(task.id, character.id);
            const row = document.createElement("div");
            row.className = "task-character-row";
            row.innerHTML = `
              <label>
                <input type="checkbox">
                <span></span>
              </label>
              <div class="task-timer"></div>
            `;
            const checkbox = row.querySelector("input");
            checkbox.checked = Boolean(completion);
            row.querySelector("label span").textContent = character.name;
            row.querySelector(".task-timer").textContent = completion ? formatRemaining(completion.unlockAt) : "Liberada";
            checkbox.addEventListener("change", () => {
              const key = getCompletionKey(task.id, character.id);
              if (checkbox.checked) {
                const now = new Date();
                state.routineCompletions[key] = {
                  completedAt: now.getTime(),
                  unlockAt: getTaskUnlockAt(task, now)
                };
              } else {
                delete state.routineCompletions[key];
              }
              saveState();
              render();
            });
            rows.appendChild(row);
          });
          gridEl.appendChild(taskCard);
        });

        routineSections.appendChild(section);
      });
    }

    function getSelectedQuest() {
      return state.quests.find((quest) => quest.id === state.selectedQuestId) || null;
    }

    function getSelectedQuestCharacter() {
      return state.characters.find((character) => character.id === state.selectedQuestCharacterId) || null;
    }

    function copyCoordinate(value, button) {
      navigator.clipboard?.writeText(value).then(() => {
        const previous = button.textContent;
        button.textContent = "✓";
        window.setTimeout(() => {
          button.textContent = previous;
        }, 900);
      }).catch(() => {
        const input = document.createElement("input");
        input.value = value;
        document.body.appendChild(input);
        input.select();
        document.execCommand("copy");
        input.remove();
      });
    }

    function renderQuestList() {
      questList.innerHTML = "";

      if (!state.quests.length) {
        questList.innerHTML = `
          <div class="empty-state">
            <div>
              <strong>Nenhuma quest criada ainda</strong>
              <span>Use Adicionar Quest para registrar spoilers em seções, coordenadas e progresso por personagem.</span>
            </div>
          </div>
        `;
        return;
      }

      state.quests.forEach((quest) => {
        const eligibleCharacters = getOrderedCharacters().filter((character) => isCharacterEligibleForQuest(character, quest));
        const completedCount = eligibleCharacters.filter((character) => getQuestProgress(quest.id, character.id)?.status === "completed").length;
        const card = document.createElement("article");
        card.className = `quest-card${state.selectedQuestId === quest.id ? " active" : ""}${expandedQuestId === quest.id ? " expanded" : ""}`;
        card.innerHTML = `
          <div class="quest-card-main">
            <button class="nav-card-main" type="button">
              <strong></strong>
              <span></span>
            </button>
            <button class="quest-toggle" type="button" aria-label="Ver personagens" title="Ver personagens">+</button>
            <button class="quest-menu-button" type="button" aria-label="Opções da quest" title="Opções da quest">...</button>
          </div>
          <div class="quest-roster"></div>
        `;

        card.querySelector("strong").textContent = quest.name;
        card.querySelector(".quest-card-main span").textContent = `Nv. ${quest.minLevel}${hasValue(quest.minNwLevel) ? ` · NW ${quest.minNwLevel}` : ""} · ${completedCount}/${eligibleCharacters.length} completos`;
        card.querySelector(".nav-card-main").addEventListener("click", () => {
          state.selectedQuestId = quest.id;
          state.selectedQuestCharacterId = eligibleCharacters[0]?.id || null;
          saveState();
          render();
        });
        card.querySelector(".quest-toggle").addEventListener("click", () => {
          expandedQuestId = expandedQuestId === quest.id ? null : quest.id;
          state.selectedQuestId = quest.id;
          saveState();
          render();
        });
        card.querySelector(".quest-menu-button").addEventListener("click", () => openQuestModal(quest));

        const roster = card.querySelector(".quest-roster");
        if (!eligibleCharacters.length) {
          roster.innerHTML = '<div class="task-timer">Nenhum personagem cumpre os requisitos desta quest.</div>';
        }

        eligibleCharacters.forEach((character) => {
          const progress = getQuestProgress(quest.id, character.id);
          const row = document.createElement("div");
          row.className = "quest-character";
          row.innerHTML = `
            <div class="quest-character-name">
              <strong></strong>
              <span></span>
            </div>
            <div class="quest-character-actions">
              <button class="ghost-button" type="button" data-action="select">Ver</button>
              <button class="secondary-button" type="button" data-action="start">Começar</button>
              <button class="primary-button" type="button" data-action="complete">Marcar completada</button>
              <button class="quest-menu-button" type="button" data-action="reset" aria-label="Resetar personagem" title="Resetar personagem">...</button>
            </div>
          `;
          row.querySelector("strong").textContent = character.name;
          row.querySelector("span").textContent = progress?.status === "completed" ? "Quest completada" : progress ? "Em andamento" : "Não iniciada";
          row.querySelector('[data-action="select"]').addEventListener("click", () => {
            state.selectedQuestId = quest.id;
            state.selectedQuestCharacterId = character.id;
            saveState();
            render();
          });
          row.querySelector('[data-action="start"]').addEventListener("click", () => {
            setQuestProgress(quest.id, character.id, { status: "started" });
            state.selectedQuestId = quest.id;
            state.selectedQuestCharacterId = character.id;
            saveState();
            render();
          });
          row.querySelector('[data-action="complete"]').addEventListener("click", () => {
            setQuestProgress(quest.id, character.id, {
              status: "completed",
              completedSections: quest.sections.map((section) => section.id),
              completedAt: Date.now()
            });
            state.selectedQuestId = quest.id;
            state.selectedQuestCharacterId = character.id;
            saveState();
            render();
          });
          row.querySelector('[data-action="reset"]').addEventListener("click", () => {
            const key = getQuestProgressKey(quest.id, character.id);
            delete state.questProgress[key];
            if (state.selectedQuestCharacterId === character.id) state.selectedQuestCharacterId = null;
            saveState();
            render();
          });
          roster.appendChild(row);
        });

        questList.appendChild(card);
      });
    }

    function renderQuestDetail() {
      const quest = getSelectedQuest();
      questLayout.classList.toggle("detail-open", Boolean(quest));
      questDetail.innerHTML = "";
      if (!quest) return;

      const eligibleCharacters = getOrderedCharacters().filter((character) => isCharacterEligibleForQuest(character, quest));
      if (!eligibleCharacters.some((character) => character.id === state.selectedQuestCharacterId)) {
        state.selectedQuestCharacterId = eligibleCharacters[0]?.id || null;
      }
      const character = getSelectedQuestCharacter();
      const progress = character ? getQuestProgress(quest.id, character.id) : null;
      const completedSections = new Set(progress?.completedSections || []);

      questDetail.innerHTML = `
        <div class="quest-detail-header">
          <div>
            <h2></h2>
            <span></span>
          </div>
          <button class="quest-menu-button" type="button" aria-label="Editar quest" title="Editar quest">...</button>
        </div>
        <div class="quest-sections"></div>
      `;
      questDetail.querySelector("h2").textContent = quest.name;
      questDetail.querySelector(".quest-detail-header span").textContent = character
        ? `${character.name} · ${progress?.status === "completed" ? "completada" : progress ? "em andamento" : "não iniciada"}`
        : "Nenhum personagem elegível para os requisitos atuais.";
      questDetail.querySelector(".quest-menu-button").addEventListener("click", () => openQuestModal(quest));

      const sections = questDetail.querySelector(".quest-sections");
      quest.sections.forEach((section) => {
        const sectionEl = document.createElement("article");
        sectionEl.className = "quest-section";
        sectionEl.innerHTML = `
          <label>
            <input type="checkbox">
            <span></span>
          </label>
          <p></p>
          <div class="coord-list"></div>
        `;
        const checkbox = sectionEl.querySelector("input");
        checkbox.checked = completedSections.has(section.id);
        checkbox.disabled = !character;
        sectionEl.querySelector("label span").textContent = section.title;
        sectionEl.querySelector("p").textContent = section.text || "Sem texto explicativo nesta seção.";
        checkbox.addEventListener("change", () => {
          if (!character) return;
          const nextSections = new Set(getQuestProgress(quest.id, character.id)?.completedSections || []);
          if (checkbox.checked) nextSections.add(section.id);
          else nextSections.delete(section.id);
          setQuestProgress(quest.id, character.id, { status: "started", completedSections: [...nextSections] });
          saveState();
          render();
        });

        const coordList = sectionEl.querySelector(".coord-list");
        section.coordinates.forEach((coordinate) => {
          const chip = document.createElement("span");
          chip.className = "coord-chip";
          chip.innerHTML = `<span></span><button class="copy-button" type="button" aria-label="Copiar coordenada" title="Copiar coordenada">⧉</button>`;
          chip.querySelector("span").textContent = coordinate;
          chip.querySelector("button").addEventListener("click", () => copyCoordinate(coordinate, chip.querySelector("button")));
          coordList.appendChild(chip);
        });

        sections.appendChild(sectionEl);
      });
    }

    function renderQuests() {
      renderQuestList();
      renderQuestDetail();
    }

    function createQuestSectionEditor(section = {}) {
      const draft = normalizeQuestSection(section);
      const editor = document.createElement("div");
      editor.className = "quest-section-editor";
      editor.dataset.sectionId = draft.id;
      editor.innerHTML = `
        <label class="field">
          <span>Título da seção</span>
          <input class="quest-section-title" type="text" maxlength="70">
        </label>
        <label class="field">
          <span>Texto do spoiler</span>
          <textarea class="quest-section-text" placeholder="Escreva uma etapa curta da quest."></textarea>
        </label>
        <div class="coord-editor">
          <label class="field">
            <span>Coordenada</span>
            <input class="quest-coordinate-input" type="text" maxlength="80" placeholder="Ex: 1234, 5678, 7">
          </label>
          <button class="secondary-button add-coordinate-button" type="button">Adicionar coordenada</button>
        </div>
        <div class="coord-editor-list"></div>
      `;
      editor.querySelector(".quest-section-title").value = draft.title;
      editor.querySelector(".quest-section-text").value = draft.text;

      const coordList = editor.querySelector(".coord-editor-list");
      function addCoordButton(value) {
        const button = document.createElement("button");
        button.type = "button";
        button.dataset.coordinate = value;
        button.textContent = `${value} ×`;
        button.addEventListener("click", () => button.remove());
        coordList.appendChild(button);
      }

      draft.coordinates.forEach(addCoordButton);
      editor.querySelector(".add-coordinate-button").addEventListener("click", () => {
        const input = editor.querySelector(".quest-coordinate-input");
        const value = input.value.trim();
        if (!value) return;
        addCoordButton(value);
        input.value = "";
        input.focus();
      });

      return editor;
    }

    function openQuestModal(quest = null) {
      editingQuestId = quest?.id || null;
      const draft = normalizeQuest(quest || {});
      questModalTitle.textContent = editingQuestId ? "Editar Quest" : "Adicionar Quest";
      questName.value = editingQuestId ? draft.name : "";
      questMinLevel.value = draft.minLevel || 1;
      questMinNwLevel.value = hasValue(draft.minNwLevel) ? draft.minNwLevel : "";
      questSectionEditors.innerHTML = "";
      draft.sections.forEach((section) => questSectionEditors.appendChild(createQuestSectionEditor(section)));
      deleteQuestButton.style.display = editingQuestId ? "inline-flex" : "none";
      questModalBackdrop.classList.add("open");
      document.body.style.overflow = "hidden";
      questName.focus();
    }

    function closeQuestModal() {
      questModalBackdrop.classList.remove("open");
      document.body.style.overflow = "";
      editingQuestId = null;
      questForm.reset();
      questSectionEditors.innerHTML = "";
    }

    function getQuestFromForm() {
      const existing = state.quests.find((quest) => quest.id === editingQuestId);
      const sections = [...questSectionEditors.querySelectorAll(".quest-section-editor")].map((editor, index) => {
        const coordinates = [...editor.querySelectorAll(".coord-editor-list button")].map((button) => button.dataset.coordinate).filter(Boolean);
        return normalizeQuestSection({
          id: editor.dataset.sectionId,
          title: editor.querySelector(".quest-section-title").value.trim() || `Seção ${index + 1}`,
          text: editor.querySelector(".quest-section-text").value.trim(),
          coordinates
        });
      });

      return normalizeQuest({
        id: editingQuestId || `quest:${Date.now()}:${Math.random().toString(16).slice(2)}`,
        name: questName.value.trim(),
        minLevel: questMinLevel.value,
        minNwLevel: questMinNwLevel.value,
        sections,
        createdAt: existing?.createdAt || Date.now()
      });
    }

    function render() {
      app.style.setProperty("--sidebar-width", `${state.sidebarWidth || 292}px`);
      app.classList.toggle("sidebar-collapsed", state.collapsed);
      toggleSidebar.setAttribute("aria-label", state.collapsed ? "Expandir menu" : "Recolher menu");
      toggleSidebar.title = state.collapsed ? "Expandir menu" : "Recolher menu";
      renderList();
      renderCards();
      renderRoutineSections();
      renderQuests();
      renderStats();
    }

    function switchTab(tabName) {
      tabButtons.forEach((button) => {
        button.classList.toggle("active", button.dataset.tab === tabName);
      });
      tabPanels.forEach((panel) => {
        panel.classList.toggle("active", panel.dataset.panel === tabName);
      });
    }

    function exportJson() {
      const payload = {
        exportedAt: new Date().toISOString(),
        app: "Organização PxG",
        version: 3,
        data: state
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `organizacao-pxg-${new Date().toISOString().slice(0, 10)}.json`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function importJson(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.addEventListener("load", () => {
        try {
          const parsed = JSON.parse(String(reader.result || "{}"));
          const incoming = parsed.data || parsed;
          if (!Array.isArray(incoming.characters)) {
            throw new Error("Arquivo sem lista de personagens.");
          }

          state = {
            collapsed: Boolean(incoming.collapsed),
            sidebarWidth: clampNumber(incoming.sidebarWidth || 292, 236, 460) || 292,
            selectedId: incoming.selectedId || incoming.characters[0]?.id || null,
            characters: normalizeCharacters(incoming.characters),
            routineTasks: mergeRoutineTasks(incoming.routineTasks),
            routineCompletions: incoming.routineCompletions && typeof incoming.routineCompletions === "object" ? incoming.routineCompletions : {},
            showRoutineOnCharacters: Boolean(incoming.showRoutineOnCharacters),
            quests: normalizeQuests(incoming.quests),
            questProgress: incoming.questProgress && typeof incoming.questProgress === "object" ? incoming.questProgress : {},
            selectedQuestId: incoming.selectedQuestId || null,
            selectedQuestCharacterId: incoming.selectedQuestCharacterId || null
          };
          saveState();
          render();
        } catch (error) {
          alert("Não foi possível importar este JSON. Confira se o arquivo foi exportado por este app.");
        } finally {
          importJsonInput.value = "";
        }
      });
      reader.readAsText(file);
    }

    addCharacterButton.addEventListener("click", () => openModal());

    editSelectedButton.addEventListener("click", () => {
      const character = state.characters.find((item) => item.id === state.selectedId);
      if (character) openModal(character);
    });

    toggleSidebar.addEventListener("click", () => {
      state.collapsed = !state.collapsed;
      saveState();
      render();
    });

    resizeHandle.addEventListener("pointerdown", (event) => {
      if (state.collapsed) return;
      event.preventDefault();
      resizeHandle.setPointerCapture(event.pointerId);

      const startX = event.clientX;
      const startWidth = state.sidebarWidth || 292;

      function onMove(moveEvent) {
        state.sidebarWidth = clampNumber(startWidth + moveEvent.clientX - startX, 236, 460) || startWidth;
        app.style.setProperty("--sidebar-width", `${state.sidebarWidth}px`);
      }

      function onUp() {
        saveState();
        resizeHandle.removeEventListener("pointermove", onMove);
        resizeHandle.removeEventListener("pointerup", onUp);
        resizeHandle.removeEventListener("pointercancel", onUp);
      }

      resizeHandle.addEventListener("pointermove", onMove);
      resizeHandle.addEventListener("pointerup", onUp);
      resizeHandle.addEventListener("pointercancel", onUp);
    });

    exportJsonButton.addEventListener("click", exportJson);
    importJsonButton.addEventListener("click", () => importJsonInput.click());
    importJsonInput.addEventListener("change", () => importJson(importJsonInput.files[0]));
    tabButtons.forEach((button) => {
      button.addEventListener("click", () => switchTab(button.dataset.tab));
    });
    addRoutineTaskButton.addEventListener("click", () => openTaskModal());
    addQuestButton.addEventListener("click", () => openQuestModal());
    addQuestSectionButton.addEventListener("click", () => {
      questSectionEditors.appendChild(createQuestSectionEditor({ title: `Seção ${questSectionEditors.children.length + 1}` }));
    });

    profession.addEventListener("change", () => refreshSpecializations());
    characterClan.addEventListener("change", () => renderClanPreview(characterClan.value));

    closeModalButton.addEventListener("click", closeModal);
    cancelModalButton.addEventListener("click", closeModal);
    closeTaskModalButton.addEventListener("click", closeTaskModal);
    cancelTaskModalButton.addEventListener("click", closeTaskModal);
    closeQuestModalButton.addEventListener("click", closeQuestModal);
    cancelQuestModalButton.addEventListener("click", closeQuestModal);
    finishQuestEditButton.addEventListener("click", () => {
      questForm.requestSubmit();
    });

    modalBackdrop.addEventListener("click", (event) => {
      if (event.target === modalBackdrop) closeModal();
    });
    taskModalBackdrop.addEventListener("click", (event) => {
      if (event.target === taskModalBackdrop) closeTaskModal();
    });
    questModalBackdrop.addEventListener("click", (event) => {
      if (event.target === questModalBackdrop) closeQuestModal();
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && modalBackdrop.classList.contains("open")) {
        closeModal();
      }
      if (event.key === "Escape" && taskModalBackdrop.classList.contains("open")) {
        closeTaskModal();
      }
      if (event.key === "Escape" && questModalBackdrop.classList.contains("open")) {
        closeQuestModal();
      }
    });

    deleteFromModalButton.addEventListener("click", () => {
      if (editingId) removeCharacter(editingId);
    });
    deleteTaskButton.addEventListener("click", () => {
      const task = state.routineTasks.find((item) => item.id === editingTaskId);
      if (!task || task.defaultTask || !confirm(`Remover ${task.name}?`)) return;
      state.routineTasks = state.routineTasks.filter((item) => item.id !== editingTaskId);
      Object.keys(state.routineCompletions).forEach((key) => {
        if (key.startsWith(`${editingTaskId}::`)) delete state.routineCompletions[key];
      });
      saveState();
      closeTaskModal();
      render();
    });
    deleteQuestButton.addEventListener("click", () => {
      const quest = state.quests.find((item) => item.id === editingQuestId);
      if (!quest || !confirm(`Remover ${quest.name}?`)) return;
      state.quests = state.quests.filter((item) => item.id !== editingQuestId);
      Object.keys(state.questProgress).forEach((key) => {
        if (key.startsWith(`${editingQuestId}::`)) delete state.questProgress[key];
      });
      if (state.selectedQuestId === editingQuestId) {
        state.selectedQuestId = state.quests[0]?.id || null;
        state.selectedQuestCharacterId = null;
      }
      saveState();
      closeQuestModal();
      render();
    });
    taskKind.addEventListener("change", () => {
      taskDurationRow.style.display = taskKind.value === "custom" ? "grid" : "none";
    });

    characterForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const character = createCharacterFromForm(editingId || String(Date.now()));

      if (editingId) {
        state.characters = state.characters.map((item) => item.id === editingId ? character : item);
      } else {
        state.characters.unshift(character);
      }

      state.selectedId = character.id;
      saveState();
      closeModal();
      render();
    });

    taskForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const task = getTaskFromForm();
      if (!task.name) return;
      if (editingTaskId) {
        state.routineTasks = state.routineTasks.map((item) => item.id === editingTaskId ? task : item);
      } else {
        state.routineTasks.push(task);
      }
      saveState();
      closeTaskModal();
      render();
    });

    questForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const quest = getQuestFromForm();
      if (!quest.name) return;
      if (editingQuestId) {
        state.quests = state.quests.map((item) => item.id === editingQuestId ? quest : item);
      } else {
        state.quests.unshift(quest);
      }
      state.selectedQuestId = quest.id;
      expandedQuestId = quest.id;
      saveState();
      closeQuestModal();
      render();
    });

    loadState();
    state.routineTasks = mergeRoutineTasks(state.routineTasks);
    state.quests = normalizeQuests(state.quests);
    if (state.selectedQuestId && !state.quests.some((quest) => quest.id === state.selectedQuestId)) {
      state.selectedQuestId = null;
      state.selectedQuestCharacterId = null;
    }
    if (!state.selectedId && state.characters.length) {
      state.selectedId = state.characters[0].id;
    }
    saveState();
    render();
    setInterval(render, 60000);
  </script>
</body>
</html>
