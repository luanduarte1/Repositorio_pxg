<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Organização PxG</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101317;
      --panel: #171c22;
      --panel-2: #1f2630;
      --panel-3: #25323a;
      --text: #edf0f2;
      --muted: #9ba7b4;
      --line: #2b3440;
      --accent: #59c3a6;
      --accent-strong: #7ed9bf;
      --gold: #e8c15c;
      --danger: #ee6f75;
      --input: #11161c;
      --shadow: 0 22px 70px rgba(0, 0, 0, .34);
      --sidebar-width: 292px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(120deg, rgba(89, 195, 166, .06), transparent 28%),
        linear-gradient(220deg, rgba(232, 193, 92, .07), transparent 26%),
        var(--bg);
      color: var(--text);
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      display: grid;
      grid-template-columns: var(--sidebar-width) minmax(0, 1fr);
      min-height: 100vh;
      transition: grid-template-columns .22s ease;
    }

    .app.sidebar-collapsed {
      grid-template-columns: 76px minmax(0, 1fr);
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 18px;
      padding: 20px 16px;
      border-right: 1px solid var(--line);
      background: rgba(17, 22, 28, .96);
      backdrop-filter: blur(18px);
      overflow: hidden;
    }

    .resize-handle {
      position: absolute;
      top: 0;
      right: -4px;
      width: 8px;
      height: 100%;
      cursor: ew-resize;
      z-index: 2;
    }

    .resize-handle::after {
      content: "";
      position: absolute;
      top: 50%;
      right: 3px;
      width: 2px;
      height: 68px;
      border-radius: 999px;
      background: rgba(89, 195, 166, .35);
      transform: translateY(-50%);
      opacity: .45;
      transition: opacity .16s ease, background .16s ease;
    }

    .resize-handle:hover::after {
      background: var(--accent);
      opacity: 1;
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 42px;
    }

    .crest {
      width: 44px;
      height: 42px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border: 1px solid rgba(232, 193, 92, .45);
      border-radius: 8px;
      background: #24210f;
      color: var(--gold);
      font-size: 12px;
      font-weight: 800;
    }

    .brand-copy {
      min-width: 0;
      transition: opacity .18s ease;
    }

    .brand-copy strong {
      display: block;
      white-space: nowrap;
      font-size: 15px;
    }

    .brand-copy span {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .icon-button {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
      color: var(--text);
      transition: transform .16s ease, border-color .16s ease, background .16s ease;
    }

    .icon-button:hover {
      transform: translateY(-1px);
      border-color: rgba(89, 195, 166, .55);
      background: #24313a;
    }

    .sidebar-toggle {
      margin-left: auto;
    }

    .app.sidebar-collapsed .sidebar-toggle .collapse-icon {
      transform: rotate(180deg);
    }

    .collapse-icon {
      transition: transform .2s ease;
    }

    .character-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
      overflow: auto;
      padding-right: 2px;
    }

    .nav-card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 24px 24px;
      align-items: center;
      gap: 8px;
      min-height: 64px;
      width: 100%;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: var(--text);
      padding: 8px;
      text-align: left;
    }

    .nav-card-main {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      align-items: center;
      gap: 10px;
      min-width: 0;
      border: 0;
      background: transparent;
      color: inherit;
      text-align: inherit;
    }

    .nav-card:hover,
    .nav-card.active {
      border-color: var(--line);
      background: var(--panel-2);
    }

    .nav-text {
      min-width: 0;
      transition: opacity .18s ease;
    }

    .nav-text strong,
    .nav-text span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .nav-text strong {
      font-size: 13px;
    }

    .nav-text span {
      margin-top: 2px;
      color: var(--muted);
      font-size: 11px;
    }

    .clan-inline {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
      vertical-align: middle;
    }

    .clan-icon {
      width: 22px;
      height: 22px;
      flex: 0 0 auto;
      object-fit: contain;
      image-rendering: auto;
    }

    .nav-text .clan-icon {
      width: 16px;
      height: 16px;
    }

    .level-controls {
      display: grid;
      gap: 4px;
    }

    .level-button {
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(89, 195, 166, .35);
      border-radius: 6px;
      background: rgba(89, 195, 166, .1);
      color: var(--accent-strong);
      font-size: 15px;
      font-weight: 900;
      line-height: 1;
    }

    .level-button:hover {
      border-color: rgba(89, 195, 166, .7);
      background: rgba(89, 195, 166, .18);
    }

    .level-controls.nw .level-button {
      border-color: rgba(178, 116, 255, .4);
      background: rgba(178, 116, 255, .12);
      color: #cfadff;
    }

    .level-controls.nw .level-button:hover {
      border-color: rgba(178, 116, 255, .78);
      background: rgba(178, 116, 255, .22);
    }

    .app.sidebar-collapsed .brand-copy,
    .app.sidebar-collapsed .character-list,
    .app.sidebar-collapsed .nav-text,
    .app.sidebar-collapsed .sidebar-actions,
    .app.sidebar-collapsed .level-controls {
      opacity: 0;
      pointer-events: none;
    }

    .app.sidebar-collapsed .brand-copy {
      display: none;
    }

    .app.sidebar-collapsed .character-list,
    .app.sidebar-collapsed .sidebar-actions,
    .app.sidebar-collapsed .resize-handle {
      display: none;
    }

    .app.sidebar-collapsed .brand-row {
      display: grid;
      justify-items: center;
      gap: 8px;
    }

    .app.sidebar-collapsed .sidebar-toggle {
      margin-left: 0;
    }

    .app.sidebar-collapsed .sidebar {
      padding-inline: 16px;
      gap: 0;
    }

    .app.sidebar-collapsed .nav-card {
      grid-template-columns: 1fr;
      justify-content: center;
      padding: 8px 2px;
    }

    .app.sidebar-collapsed .nav-card-main {
      grid-template-columns: 1fr;
    }

    .sidebar-actions {
      display: grid;
      gap: 10px;
      margin-top: auto;
      transition: opacity .18s ease;
    }

    .sidebar-action-pair,
    .json-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    main {
      min-width: 0;
      padding: 28px;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 22px;
    }

    .topbar h1 {
      margin: 0;
      font-size: clamp(24px, 3vw, 38px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .topbar p {
      max-width: 720px;
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .primary-button,
    .secondary-button {
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      border-radius: 8px;
      padding: 0 14px;
      font-weight: 800;
      transition: transform .16s ease, background .16s ease, border-color .16s ease;
    }

    .primary-button {
      background: var(--accent);
      color: #06130f;
    }

    .primary-button:hover {
      transform: translateY(-1px);
      background: var(--accent-strong);
    }

    .secondary-button {
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
    }

    .secondary-button:hover {
      transform: translateY(-1px);
      border-color: rgba(89, 195, 166, .55);
      background: #24313a;
    }

    .secondary-button:disabled {
      cursor: not-allowed;
      opacity: .48;
      transform: none;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      align-items: start;
    }

    .character-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(23, 28, 34, .92);
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: border-color .16s ease, transform .16s ease;
    }

    .character-card:hover {
      border-color: rgba(89, 195, 166, .42);
      transform: translateY(-2px);
    }

    .character-card.dragging {
      opacity: .42;
      transform: scale(.985);
    }

    .character-card.drop-target {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(232, 193, 92, .12), var(--shadow);
    }

    .card-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 42px 42px;
      gap: 12px;
      align-items: center;
      padding: 18px;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(135deg, rgba(89, 195, 166, .2), rgba(178, 116, 255, .09) 54%, transparent),
        #202832;
    }

    .card-title {
      min-width: 0;
    }

    .card-title strong {
      display: block;
      overflow: hidden;
      color: var(--text);
      font-size: 19px;
      font-weight: 850;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .edit-button {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(232, 193, 92, .38);
      border-radius: 8px;
      background: rgba(232, 193, 92, .1);
      color: var(--gold);
      font-size: 18px;
    }

    .drag-button {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(232, 193, 92, .38);
      border-radius: 8px;
      background: rgba(232, 193, 92, .1);
      color: var(--gold);
      font-size: 18px;
      cursor: grab;
    }

    .drag-button:active {
      cursor: grabbing;
    }

    .drag-button:hover {
      border-color: rgba(232, 193, 92, .72);
      background: rgba(232, 193, 92, .16);
    }

    .edit-button:hover {
      border-color: rgba(232, 193, 92, .72);
      background: rgba(232, 193, 92, .16);
    }

    .card-facts {
      display: grid;
      gap: 9px;
      padding: 16px 18px 18px;
    }

    .fact {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 14px;
      min-height: 34px;
      border: 1px solid rgba(255, 255, 255, .06);
      border-radius: 8px;
      background: rgba(17, 22, 28, .46);
      padding: 8px 10px;
    }

    .fact:last-child {
      border-bottom: 1px solid rgba(255, 255, 255, .06);
    }

    .fact span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }

    .fact strong {
      color: var(--text);
      font-size: 14px;
      text-align: right;
    }

    .fact strong .clan-inline {
      justify-content: flex-end;
    }

    .clan-preview {
      min-height: 34px;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(255, 255, 255, .06);
      border-radius: 8px;
      background: rgba(17, 22, 28, .46);
      color: var(--muted);
      padding: 6px 9px;
      font-size: 12px;
      font-weight: 750;
    }

    .fact.highlight {
      border-color: rgba(89, 195, 166, .18);
      background: rgba(89, 195, 166, .08);
    }

    .empty-state {
      display: grid;
      place-items: center;
      min-height: 56vh;
      border: 1px dashed #34414f;
      border-radius: 8px;
      background: rgba(23, 28, 34, .58);
      text-align: center;
      padding: 36px 20px;
    }

    .empty-state strong {
      display: block;
      font-size: 20px;
    }

    .empty-state span {
      display: block;
      max-width: 460px;
      margin-top: 8px;
      color: var(--muted);
      line-height: 1.55;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: none;
      place-items: center;
      background: rgba(5, 8, 11, .62);
      backdrop-filter: blur(10px);
      padding: 20px;
    }

    .modal-backdrop.open {
      display: grid;
    }

    .character-modal {
      width: min(620px, 100%);
      max-height: min(92vh, 820px);
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(90deg, rgba(89, 195, 166, .18), transparent 72%),
        #202832;
    }

    .modal-header strong {
      display: block;
      font-size: 20px;
    }

    .modal-header span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
    }

    .modal-form {
      display: grid;
      gap: 14px;
      padding: 18px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .field span {
      color: #c8dcf0;
      font-size: 12px;
      font-weight: 650;
    }

    .field input,
    .field select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--input);
      color: var(--text);
      outline: none;
      padding: 12px;
      transition: border-color .16s ease, box-shadow .16s ease;
    }

    .field input:focus,
    .field select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(89, 195, 166, .12);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .form-grid.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr 1.55fr;
      gap: 10px;
      padding-top: 4px;
    }

    .modal-actions > button {
      min-height: 44px;
      width: 100%;
    }

    .ghost-button,
    .danger-button {
      min-height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      padding: 0 14px;
      font-weight: 780;
    }

    .ghost-button {
      border: 1px solid var(--line);
      background: transparent;
      color: var(--text);
    }

    .ghost-button:hover {
      border-color: rgba(89, 195, 166, .55);
      background: rgba(89, 195, 166, .08);
    }

    .danger-button {
      background: rgba(238, 111, 117, .12);
      color: #ff9ca0;
    }

    .danger-button:hover {
      background: rgba(238, 111, 117, .2);
    }

    @media (max-width: 860px) {
      .app,
      .app.sidebar-collapsed {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: relative;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .resize-handle {
        display: none;
      }

      .app.sidebar-collapsed .sidebar {
        height: 126px;
      }

      .character-list {
        max-height: 240px;
      }

      .topbar {
        flex-direction: column;
      }

      main {
        padding: 22px 16px 30px;
      }
    }

    @media (max-width: 620px) {
      .modal-actions,
      .form-grid,
      .form-grid.three,
      .sidebar-action-pair,
      .json-actions {
        grid-template-columns: 1fr;
      }

      .cards-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <aside class="sidebar" aria-label="Personagens">
      <div class="resize-handle" id="resizeHandle" aria-hidden="true"></div>
      <div class="brand-row">
        <div class="crest" aria-hidden="true">OPxG</div>
        <div class="brand-copy">
          <strong>Organização PxG</strong>
          <span>PokeXGames</span>
        </div>
        <button class="icon-button sidebar-toggle" id="toggleSidebar" type="button" aria-label="Recolher menu" title="Recolher menu">
          <span class="collapse-icon" aria-hidden="true">‹</span>
        </button>
      </div>

      <nav class="character-list" id="characterList" aria-label="Lista de personagens"></nav>

      <div class="sidebar-actions">
        <div class="sidebar-action-pair">
          <button class="primary-button" id="addCharacterButton" type="button">
            <span aria-hidden="true">+</span>
            <span>Adicionar</span>
          </button>
          <button class="secondary-button" id="editSelectedButton" type="button">
            <span aria-hidden="true">✎</span>
            <span>Editar</span>
          </button>
        </div>
        <div class="json-actions">
          <button class="secondary-button" id="exportJsonButton" type="button">Exportar JSON</button>
          <button class="secondary-button" id="importJsonButton" type="button">Importar JSON</button>
        </div>
        <input id="importJsonInput" type="file" accept="application/json,.json" hidden>
      </div>
    </aside>

    <main>
      <section class="topbar" aria-label="Resumo">
        <div>
          <h1>Organizador de Personagens PxG</h1>
          <p>Organize personagens de PokeXGames com clã, níveis, profissão e especialização para consultar tudo rapidamente durante o jogo.</p>
        </div>
      </section>

      <section class="cards-grid" id="cardsGrid" aria-label="Cards dos personagens"></section>
    </main>
  </div>

  <div class="modal-backdrop" id="characterModalBackdrop" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="character-modal">
      <div class="modal-header">
        <div>
          <strong id="modalTitle">Adicionar personagem</strong>
          <span>Ficha crua para consulta no organizador PxG</span>
        </div>
        <button class="icon-button" id="closeModalButton" type="button" aria-label="Fechar janela" title="Fechar janela">×</button>
      </div>

      <form class="modal-form" id="characterForm">
        <label class="field">
          <span>Nome do personagem</span>
          <input id="characterName" type="text" autocomplete="off" maxlength="40" required>
        </label>

        <div class="form-grid three">
          <label class="field">
            <span>Clã</span>
            <select id="characterClan" required></select>
            <div class="clan-preview" id="clanPreview"></div>
          </label>
          <label class="field">
            <span>Nível do personagem</span>
            <input id="characterLevel" type="number" min="1" max="625" step="1" required>
          </label>
          <label class="field">
            <span>Nível NW</span>
            <input id="nwLevel" type="number" min="1" max="100" step="1">
          </label>
        </div>

        <div class="form-grid three">
          <label class="field">
            <span>Profissão</span>
            <select id="profession"></select>
          </label>
          <label class="field">
            <span>Especialização</span>
            <select id="specialization"></select>
          </label>
          <label class="field">
            <span>Nível de profissão</span>
            <input id="professionLevel" type="number" min="1" max="120" step="1">
          </label>
        </div>

        <div class="modal-actions">
          <button class="ghost-button" id="cancelModalButton" type="button">Cancelar</button>
          <button class="danger-button" id="deleteFromModalButton" type="button">Remover</button>
          <button class="primary-button" type="submit">Salvar personagem</button>
        </div>
      </form>
    </div>
  </div>

  <template id="emptyTemplate">
    <div class="empty-state">
      <div>
        <strong>Nenhum personagem criado ainda</strong>
        <span>Use o botão de adicionar para criar o primeiro personagem do seu organizador PxG.</span>
      </div>
    </div>
  </template>

  <script>
    const STORAGE_KEY = "character-organizer:v3";
    const PREVIOUS_STORAGE_KEY = "character-organizer:v2";
    const LEGACY_STORAGE_KEY = "character-organizer:v1";
    const app = document.querySelector("#app");
    const list = document.querySelector("#characterList");
    const grid = document.querySelector("#cardsGrid");
    const toggleSidebar = document.querySelector("#toggleSidebar");
    const resizeHandle = document.querySelector("#resizeHandle");
    const emptyTemplate = document.querySelector("#emptyTemplate");
    const addCharacterButton = document.querySelector("#addCharacterButton");
    const editSelectedButton = document.querySelector("#editSelectedButton");
    const exportJsonButton = document.querySelector("#exportJsonButton");
    const importJsonButton = document.querySelector("#importJsonButton");
    const importJsonInput = document.querySelector("#importJsonInput");
    const modalBackdrop = document.querySelector("#characterModalBackdrop");
    const modalTitle = document.querySelector("#modalTitle");
    const closeModalButton = document.querySelector("#closeModalButton");
    const cancelModalButton = document.querySelector("#cancelModalButton");
    const deleteFromModalButton = document.querySelector("#deleteFromModalButton");
    const characterForm = document.querySelector("#characterForm");
    const characterName = document.querySelector("#characterName");
    const characterClan = document.querySelector("#characterClan");
    const clanPreview = document.querySelector("#clanPreview");
    const characterLevel = document.querySelector("#characterLevel");
    const nwLevel = document.querySelector("#nwLevel");
    const profession = document.querySelector("#profession");
    const specialization = document.querySelector("#specialization");
    const professionLevel = document.querySelector("#professionLevel");

    const clanOptions = ["Volcanic", "Naturia", "Gardestrike", "Malefic", "Iron Hard", "Wingeon", "Raibolt", "Psycraft", "Orebound", "Seavell"];
    const clanIcons = {
      Volcanic: "assets/clans/volcanic.png",
      Naturia: "assets/clans/naturia.png",
      Gardestrike: "assets/clans/gardestrike.png",
      Malefic: "assets/clans/malefic.png",
      "Iron Hard": "assets/clans/iron-hard.png",
      Wingeon: "assets/clans/wingeon.png",
      Raibolt: "assets/clans/raibolt.png",
      Psycraft: "assets/clans/psycraft.png",
      Orebound: "assets/clans/orebound.png",
      Seavell: "assets/clans/seavell.png"
    };
    const professionOptions = ["Engenheiro", "Professor", "Estilista", "Aventureiro"];
    const specializationOptions = {
      Engenheiro: ["Mecânico", "Hacker", "Sem especialização"],
      Professor: ["Alquimista", "Acadêmico", "Sem especialização"],
      Estilista: ["Decorador", "Designer", "Sem especialização"],
      Aventureiro: ["Cozinheiro", "Arqueólogo", "Sem especialização"]
    };

    let state = {
      collapsed: false,
      sidebarWidth: 292,
      selectedId: null,
      characters: []
    };

    let editingId = null;

    function clampNumber(value, min, max) {
      if (value === "" || value === null || value === undefined) return null;
      const number = Number(value);
      if (!Number.isFinite(number)) return min;
      return Math.min(max, Math.max(min, Math.round(number)));
    }

    function hasValue(value) {
      return value !== "" && value !== null && value !== undefined;
    }

    function normalizeCharacters(characters) {
      const normalized = characters.map(normalizeCharacter);
      if (normalized.every((character) => character.order !== null)) {
        return normalized;
      }

      return [...normalized]
        .sort((a, b) => b.characterLevel - a.characterLevel)
        .map((character, index) => ({ ...character, order: index }));
    }

    function getOrderedCharacters() {
      return [...state.characters].sort((a, b) => {
        if (a.order !== b.order) return a.order - b.order;
        return b.characterLevel - a.characterLevel;
      });
    }

    function getNextOrder() {
      if (!state.characters.length) return 0;
      return Math.min(...state.characters.map((character) => character.order ?? 0)) - 1;
    }

    function buildClanInline(clan) {
      const wrapper = document.createElement("span");
      wrapper.className = "clan-inline";

      const icon = document.createElement("img");
      icon.className = "clan-icon";
      icon.alt = "";
      icon.loading = "lazy";
      if (clanIcons[clan]) {
        icon.src = clanIcons[clan];
      }

      const name = document.createElement("span");
      name.textContent = clan;

      if (clanIcons[clan]) wrapper.appendChild(icon);
      wrapper.appendChild(name);
      return wrapper;
    }

    function renderClanPreview(clan) {
      clanPreview.innerHTML = "";
      clanPreview.appendChild(buildClanInline(clan));
    }

    function normalizeCharacter(character) {
      const professionName = professionOptions.includes(character.profession) ? character.profession : "";
      const availableSpecs = professionName ? specializationOptions[professionName] : [];
      const spec = professionName && availableSpecs.includes(character.specialization) ? character.specialization : "";

      return {
        id: character.id || String(Date.now()),
        name: character.name || "Sem nome",
        clan: clanOptions.includes(character.clan) ? character.clan : character.className && clanOptions.includes(character.className) ? character.className : "Naturia",
        characterLevel: clampNumber(character.characterLevel || character.level || 1, 1, 625) || 1,
        nwLevel: clampNumber(character.nwLevel, 1, 100),
        profession: professionName,
        specialization: spec,
        professionLevel: clampNumber(character.professionLevel, 1, 120),
        order: Number.isFinite(Number(character.order)) ? Number(character.order) : null,
        createdAt: character.createdAt || Date.now()
      };
    }

    function loadState() {
      const saved = localStorage.getItem(STORAGE_KEY) || localStorage.getItem(PREVIOUS_STORAGE_KEY) || localStorage.getItem(LEGACY_STORAGE_KEY);
      if (!saved) return;

      try {
        const parsed = JSON.parse(saved);
        state = {
          collapsed: Boolean(parsed.collapsed),
          sidebarWidth: clampNumber(parsed.sidebarWidth || 292, 236, 460) || 292,
          selectedId: parsed.selectedId || null,
          characters: Array.isArray(parsed.characters) ? normalizeCharacters(parsed.characters) : []
        };
      } catch {
        localStorage.removeItem(STORAGE_KEY);
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function createCharacterFromForm(id = String(Date.now())) {
      return normalizeCharacter({
        id,
        name: characterName.value.trim() || "Sem nome",
        clan: characterClan.value,
        characterLevel: characterLevel.value,
        nwLevel: nwLevel.value,
        profession: profession.value,
        specialization: specialization.value,
        professionLevel: professionLevel.value,
        order: state.characters.find((character) => character.id === id)?.order ?? getNextOrder(),
        createdAt: state.characters.find((character) => character.id === id)?.createdAt || Date.now()
      });
    }

    function setSelectOptions(select, options, selectedValue) {
      select.innerHTML = "";
      select.add(new Option("Não informado", "", false, !selectedValue));
      options.forEach((option) => {
        select.add(new Option(option, option, false, option === selectedValue));
      });
    }

    function refreshSpecializations(selectedValue) {
      const options = specializationOptions[profession.value] || [];
      const nextSelected = options.includes(selectedValue) ? selectedValue : "";
      setSelectOptions(specialization, options, nextSelected);
      specialization.disabled = !profession.value;
    }

    function openModal(character = null) {
      editingId = character?.id || null;
      modalTitle.textContent = editingId ? "Editar personagem" : "Adicionar personagem";
      deleteFromModalButton.style.display = editingId ? "inline-flex" : "none";

      const draft = normalizeCharacter(character || {});
      characterName.value = editingId ? draft.name : "";
      characterLevel.value = draft.characterLevel;
      nwLevel.value = hasValue(draft.nwLevel) ? draft.nwLevel : "";
      professionLevel.value = hasValue(draft.professionLevel) ? draft.professionLevel : "";
      setSelectOptions(characterClan, clanOptions, draft.clan);
      setSelectOptions(profession, professionOptions, draft.profession);
      renderClanPreview(characterClan.value);
      refreshSpecializations(draft.specialization);

      modalBackdrop.classList.add("open");
      document.body.style.overflow = "hidden";
      characterName.focus();
    }

    function closeModal() {
      modalBackdrop.classList.remove("open");
      document.body.style.overflow = "";
      editingId = null;
      characterForm.reset();
    }

    function removeCharacter(id) {
      const character = state.characters.find((item) => item.id === id);
      const label = character ? character.name : "este personagem";
      if (!confirm(`Remover ${label}?`)) return;

      state.characters = state.characters.filter((item) => item.id !== id);
      if (state.selectedId === id) {
        state.selectedId = state.characters[0]?.id || null;
      }
      saveState();
      closeModal();
      render();
    }

    function updateCharacter(id, patch) {
      state.characters = state.characters.map((character) => {
        if (character.id !== id) return character;
        return normalizeCharacter({ ...character, ...patch });
      });
      saveState();
      render();
    }

    function reorderCharacter(draggedId, targetId) {
      if (!draggedId || !targetId || draggedId === targetId) return;
      const ordered = getOrderedCharacters();
      const draggedIndex = ordered.findIndex((character) => character.id === draggedId);
      const targetIndex = ordered.findIndex((character) => character.id === targetId);
      if (draggedIndex < 0 || targetIndex < 0) return;

      const [dragged] = ordered.splice(draggedIndex, 1);
      ordered.splice(targetIndex, 0, dragged);
      const orderById = new Map(ordered.map((character, index) => [character.id, index]));
      state.characters = state.characters.map((character) => ({
        ...character,
        order: orderById.get(character.id)
      }));
      saveState();
      render();
    }

    function adjustCharacterLevel(id, field, delta) {
      const character = state.characters.find((item) => item.id === id);
      if (!character) return;
      const max = field === "characterLevel" ? 625 : 100;
      updateCharacter(id, { [field]: clampNumber(Number(character[field]) + delta, 1, max) });
    }

    function selectCharacter(id) {
      state.selectedId = id;
      saveState();
      render();
      document.querySelector(`[data-card-id="${id}"]`)?.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function renderList() {
      list.innerHTML = "";

      const orderedCharacters = getOrderedCharacters();

      orderedCharacters.forEach((character) => {
        const item = document.createElement("div");
        item.className = `nav-card${character.id === state.selectedId ? " active" : ""}`;
        item.title = character.name;

        const select = document.createElement("button");
        select.className = "nav-card-main";
        select.type = "button";
        select.setAttribute("aria-label", `Selecionar ${character.name}`);
        select.addEventListener("click", () => selectCharacter(character.id));

        const text = document.createElement("span");
        text.className = "nav-text";
        text.innerHTML = `<strong></strong><span></span>`;
        text.querySelector("strong").textContent = character.name;
        const navDetail = text.querySelector("span");
        navDetail.appendChild(buildClanInline(character.clan));
        navDetail.append(` · Nv. ${character.characterLevel}${hasValue(character.nwLevel) ? ` · NW ${character.nwLevel}` : ""}`);

        const characterControls = document.createElement("div");
        characterControls.className = "level-controls";
        characterControls.setAttribute("aria-label", `Alterar nível de ${character.name}`);
        characterControls.innerHTML = `
          <button class="level-button" type="button" aria-label="Aumentar nível do personagem">+</button>
          <button class="level-button" type="button" aria-label="Diminuir nível do personagem">-</button>
        `;
        const [increaseCharacter, decreaseCharacter] = characterControls.querySelectorAll("button");
        increaseCharacter.addEventListener("click", () => adjustCharacterLevel(character.id, "characterLevel", 1));
        decreaseCharacter.addEventListener("click", () => adjustCharacterLevel(character.id, "characterLevel", -1));

        const nwControls = document.createElement("div");
        nwControls.className = "level-controls nw";
        nwControls.setAttribute("aria-label", `Alterar nível NW de ${character.name}`);
        nwControls.innerHTML = `
          <button class="level-button" type="button" aria-label="Aumentar nível NW">+</button>
          <button class="level-button" type="button" aria-label="Diminuir nível NW">-</button>
        `;
        const [increaseNw, decreaseNw] = nwControls.querySelectorAll("button");
        increaseNw.addEventListener("click", () => adjustCharacterLevel(character.id, "nwLevel", 1));
        decreaseNw.addEventListener("click", () => adjustCharacterLevel(character.id, "nwLevel", -1));

        select.append(text);
        item.append(select, characterControls, nwControls);
        list.appendChild(item);
      });
    }

    function renderCards() {
      grid.innerHTML = "";

      if (!state.characters.length) {
        grid.appendChild(emptyTemplate.content.cloneNode(true));
        return;
      }

      const orderedCharacters = getOrderedCharacters();

      orderedCharacters.forEach((character) => {
        const card = document.createElement("article");
        card.className = "character-card";
        card.dataset.cardId = character.id;
        card.draggable = false;

        const professionDisplay = character.profession
          ? `${character.profession}${hasValue(character.professionLevel) ? ` (${character.professionLevel})` : ""}`
          : "";
        const facts = [
          { label: "Clã", value: character.clan, highlight: true },
          { label: "Nível personagem", value: character.characterLevel },
          { label: "Nível NW", value: character.nwLevel },
          { label: "Profissão", value: professionDisplay },
          { label: "Especialização", value: character.specialization }
        ].filter((fact) => hasValue(fact.value));

        card.innerHTML = `
          <div class="card-header">
            <div class="card-title">
              <strong></strong>
            </div>
            <button class="drag-button" type="button" aria-label="Mover card livremente" title="Mover card livremente">✥</button>
            <button class="edit-button" type="button" aria-label="Editar personagem" title="Editar personagem">✎</button>
          </div>
          <div class="card-facts"></div>
        `;

        card.querySelector(".card-title strong").textContent = character.name;
        const factsContainer = card.querySelector(".card-facts");
        facts.forEach((fact) => {
          const row = document.createElement("div");
          row.className = `fact${fact.highlight ? " highlight" : ""}`;
          row.innerHTML = `<span></span><strong></strong>`;
          row.querySelector("span").textContent = fact.label;
          if (fact.label === "Clã") {
            row.querySelector("strong").appendChild(buildClanInline(fact.value));
          } else {
            row.querySelector("strong").textContent = fact.value;
          }
          factsContainer.appendChild(row);
        });

        const dragButton = card.querySelector(".drag-button");
        dragButton.addEventListener("pointerdown", () => {
          card.draggable = true;
        });
        dragButton.addEventListener("pointerup", () => {
          card.draggable = false;
        });
        card.addEventListener("dragstart", (event) => {
          event.dataTransfer.setData("text/plain", character.id);
          event.dataTransfer.effectAllowed = "move";
          card.classList.add("dragging");
        });
        card.addEventListener("dragend", () => {
          card.draggable = false;
          card.classList.remove("dragging");
          document.querySelectorAll(".drop-target").forEach((target) => target.classList.remove("drop-target"));
        });
        card.addEventListener("dragover", (event) => {
          event.preventDefault();
          if (!card.classList.contains("dragging")) {
            card.classList.add("drop-target");
          }
        });
        card.addEventListener("dragleave", () => {
          card.classList.remove("drop-target");
        });
        card.addEventListener("drop", (event) => {
          event.preventDefault();
          card.classList.remove("drop-target");
          reorderCharacter(event.dataTransfer.getData("text/plain"), character.id);
        });
        card.querySelector(".edit-button").addEventListener("click", () => {
          state.selectedId = character.id;
          saveState();
          render();
          openModal(character);
        });

        grid.appendChild(card);
      });
    }

    function renderStats() {
      editSelectedButton.disabled = !state.selectedId;
    }

    function render() {
      app.style.setProperty("--sidebar-width", `${state.sidebarWidth || 292}px`);
      app.classList.toggle("sidebar-collapsed", state.collapsed);
      toggleSidebar.setAttribute("aria-label", state.collapsed ? "Expandir menu" : "Recolher menu");
      toggleSidebar.title = state.collapsed ? "Expandir menu" : "Recolher menu";
      renderList();
      renderCards();
      renderStats();
    }

    function exportJson() {
      const payload = {
        exportedAt: new Date().toISOString(),
        app: "Organização PxG",
        version: 3,
        data: state
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `organizacao-pxg-${new Date().toISOString().slice(0, 10)}.json`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function importJson(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.addEventListener("load", () => {
        try {
          const parsed = JSON.parse(String(reader.result || "{}"));
          const incoming = parsed.data || parsed;
          if (!Array.isArray(incoming.characters)) {
            throw new Error("Arquivo sem lista de personagens.");
          }

          state = {
            collapsed: Boolean(incoming.collapsed),
            sidebarWidth: clampNumber(incoming.sidebarWidth || 292, 236, 460) || 292,
            selectedId: incoming.selectedId || incoming.characters[0]?.id || null,
            characters: normalizeCharacters(incoming.characters)
          };
          saveState();
          render();
        } catch (error) {
          alert("Não foi possível importar este JSON. Confira se o arquivo foi exportado por este app.");
        } finally {
          importJsonInput.value = "";
        }
      });
      reader.readAsText(file);
    }

    addCharacterButton.addEventListener("click", () => openModal());

    editSelectedButton.addEventListener("click", () => {
      const character = state.characters.find((item) => item.id === state.selectedId);
      if (character) openModal(character);
    });

    toggleSidebar.addEventListener("click", () => {
      state.collapsed = !state.collapsed;
      saveState();
      render();
    });

    resizeHandle.addEventListener("pointerdown", (event) => {
      if (state.collapsed) return;
      event.preventDefault();
      resizeHandle.setPointerCapture(event.pointerId);

      const startX = event.clientX;
      const startWidth = state.sidebarWidth || 292;

      function onMove(moveEvent) {
        state.sidebarWidth = clampNumber(startWidth + moveEvent.clientX - startX, 236, 460) || startWidth;
        app.style.setProperty("--sidebar-width", `${state.sidebarWidth}px`);
      }

      function onUp() {
        saveState();
        resizeHandle.removeEventListener("pointermove", onMove);
        resizeHandle.removeEventListener("pointerup", onUp);
        resizeHandle.removeEventListener("pointercancel", onUp);
      }

      resizeHandle.addEventListener("pointermove", onMove);
      resizeHandle.addEventListener("pointerup", onUp);
      resizeHandle.addEventListener("pointercancel", onUp);
    });

    exportJsonButton.addEventListener("click", exportJson);
    importJsonButton.addEventListener("click", () => importJsonInput.click());
    importJsonInput.addEventListener("change", () => importJson(importJsonInput.files[0]));

    profession.addEventListener("change", () => refreshSpecializations());
    characterClan.addEventListener("change", () => renderClanPreview(characterClan.value));

    closeModalButton.addEventListener("click", closeModal);
    cancelModalButton.addEventListener("click", closeModal);

    modalBackdrop.addEventListener("click", (event) => {
      if (event.target === modalBackdrop) closeModal();
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && modalBackdrop.classList.contains("open")) {
        closeModal();
      }
    });

    deleteFromModalButton.addEventListener("click", () => {
      if (editingId) removeCharacter(editingId);
    });

    characterForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const character = createCharacterFromForm(editingId || String(Date.now()));

      if (editingId) {
        state.characters = state.characters.map((item) => item.id === editingId ? character : item);
      } else {
        state.characters.unshift(character);
      }

      state.selectedId = character.id;
      saveState();
      closeModal();
      render();
    });

    loadState();
    if (!state.selectedId && state.characters.length) {
      state.selectedId = state.characters[0].id;
    }
    saveState();
    render();
  </script>
</body>
</html>
