<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Organização PxG</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101317;
      --panel: #171c22;
      --panel-2: #1f2630;
      --panel-3: #25323a;
      --text: #edf0f2;
      --muted: #9ba7b4;
      --line: #2b3440;
      --accent: #59c3a6;
      --accent-strong: #7ed9bf;
      --gold: #e8c15c;
      --danger: #ee6f75;
      --input: #11161c;
      --shadow: 0 22px 70px rgba(0, 0, 0, .34);
      --sidebar-width: 292px;
      --tier-red: #ff9a9a;
      --tier-yellow: #ffe28a;
      --tier-purple: #d8b4ff;
      --tier-green: #9dedb1;
      --tier-dark-green: #1f8f58;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(120deg, rgba(89, 195, 166, .06), transparent 28%),
        linear-gradient(220deg, rgba(232, 193, 92, .07), transparent 26%),
        var(--bg);
      color: var(--text);
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      display: grid;
      grid-template-columns: var(--sidebar-width) minmax(0, 1fr);
      min-height: 100vh;
      transition: grid-template-columns .22s ease;
    }

    .app.sidebar-collapsed {
      grid-template-columns: 76px minmax(0, 1fr);
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 18px;
      padding: 20px 16px;
      border-right: 1px solid var(--line);
      background: rgba(17, 22, 28, .96);
      backdrop-filter: blur(18px);
      overflow: hidden;
    }

    .resize-handle {
      position: absolute;
      top: 0;
      right: -4px;
      width: 8px;
      height: 100%;
      cursor: ew-resize;
      z-index: 2;
    }

    .resize-handle::after {
      content: "";
      position: absolute;
      top: 50%;
      right: 3px;
      width: 2px;
      height: 68px;
      border-radius: 999px;
      background: rgba(89, 195, 166, .35);
      transform: translateY(-50%);
      opacity: .45;
      transition: opacity .16s ease, background .16s ease;
    }

    .resize-handle:hover::after {
      background: var(--accent);
      opacity: 1;
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 42px;
    }

    .crest {
      width: 44px;
      height: 42px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border: 1px solid rgba(232, 193, 92, .45);
      border-radius: 8px;
      background: #24210f;
      color: var(--gold);
      font-size: 12px;
      font-weight: 800;
    }

    .brand-copy {
      min-width: 0;
      transition: opacity .18s ease;
    }

    .brand-copy strong {
      display: block;
      white-space: nowrap;
      font-size: 15px;
    }

    .brand-copy span {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .icon-button {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
      color: var(--text);
      transition: transform .16s ease, border-color .16s ease, background .16s ease;
    }

    .icon-button:hover {
      transform: translateY(-1px);
      border-color: rgba(89, 195, 166, .55);
      background: #24313a;
    }

    .sidebar-toggle {
      margin-left: auto;
    }

    .app.sidebar-collapsed .sidebar-toggle .collapse-icon {
      transform: rotate(180deg);
    }

    .collapse-icon {
      transition: transform .2s ease;
    }

    .character-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
      overflow: auto;
      padding-right: 2px;
    }

    .nav-card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 26px 26px;
      align-items: center;
      column-gap: 6px;
      min-height: 64px;
      width: 100%;
      border: 1px solid color-mix(in srgb, var(--level-color, var(--line)) 72%, transparent);
      border-radius: 8px;
      background: transparent;
      color: var(--text);
      padding: 8px;
      text-align: left;
      contain: layout paint;
    }

    .nav-card-main {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      align-items: center;
      gap: 10px;
      min-width: 0;
      max-width: 100%;
      border: 0;
      background: transparent;
      color: inherit;
      text-align: inherit;
      overflow: hidden;
    }

    .nav-card:hover,
    .nav-card.active {
      border-color: var(--level-color, var(--line));
      background: var(--panel-2);
    }

    .nav-text {
      min-width: 0;
      max-width: 100%;
      overflow: hidden;
      transition: opacity .18s ease;
    }

    .nav-text strong,
    .nav-text span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .nav-text strong {
      font-size: 13px;
    }

    .nav-text span {
      margin-top: 2px;
      color: var(--muted);
      font-size: 11px;
    }

    .clan-inline {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
      vertical-align: middle;
    }

    .clan-icon {
      width: 22px;
      height: 22px;
      flex: 0 0 auto;
      object-fit: contain;
      image-rendering: auto;
    }

    .nav-text .clan-icon {
      width: 16px;
      height: 16px;
    }

    .level-controls {
      display: grid;
      align-self: center;
      justify-self: center;
      align-content: center;
      gap: 4px;
      width: 26px;
      min-width: 26px;
    }

    .level-button {
      width: 26px;
      height: 24px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(89, 195, 166, .35);
      border-radius: 6px;
      background: rgba(89, 195, 166, .1);
      color: var(--accent-strong);
      font-size: 15px;
      font-weight: 900;
      line-height: 1;
    }

    .level-button:hover {
      border-color: rgba(89, 195, 166, .7);
      background: rgba(89, 195, 166, .18);
    }

    .level-controls.nw .level-button {
      border-color: rgba(178, 116, 255, .4);
      background: rgba(178, 116, 255, .12);
      color: #cfadff;
    }

    .level-controls.nw .level-button:hover {
      border-color: rgba(178, 116, 255, .78);
      background: rgba(178, 116, 255, .22);
    }

    .app.sidebar-collapsed .brand-copy,
    .app.sidebar-collapsed .character-list,
    .app.sidebar-collapsed .nav-text,
    .app.sidebar-collapsed .sidebar-actions,
    .app.sidebar-collapsed .level-controls {
      opacity: 0;
      pointer-events: none;
    }

    .app.sidebar-collapsed .brand-copy {
      display: none;
    }

    .app.sidebar-collapsed .character-list,
    .app.sidebar-collapsed .sidebar-actions,
    .app.sidebar-collapsed .resize-handle {
      display: none;
    }

    .app.sidebar-collapsed .brand-row {
      display: grid;
      justify-items: center;
      gap: 8px;
    }

    .app.sidebar-collapsed .sidebar-toggle {
      margin-left: 0;
    }

    .app.sidebar-collapsed .sidebar {
      padding-inline: 16px;
      gap: 0;
    }

    .app.sidebar-collapsed .nav-card {
      grid-template-columns: 1fr;
      justify-content: center;
      padding: 8px 2px;
    }

    .app.sidebar-collapsed .nav-card-main {
      grid-template-columns: 1fr;
    }

    .sidebar-actions {
      display: grid;
      gap: 10px;
      margin-top: auto;
      transition: opacity .18s ease;
    }

    .sidebar-action-pair,
    .json-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    main {
      min-width: 0;
      padding: 28px;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 22px;
    }

    .topbar h1 {
      margin: 0;
      font-size: clamp(24px, 3vw, 38px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .topbar p {
      max-width: 720px;
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 18px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 10px;
    }

    .tab-button {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(31, 38, 48, .72);
      color: var(--muted);
      padding: 0 14px;
      font-weight: 800;
      transition: border-color .16s ease, background .16s ease, color .16s ease;
    }

    .tab-button:hover,
    .tab-button.active {
      border-color: rgba(89, 195, 166, .55);
      background: rgba(89, 195, 166, .1);
      color: var(--text);
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.active {
      display: block;
    }

    .primary-button,
    .secondary-button {
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      border-radius: 8px;
      padding: 0 14px;
      font-weight: 800;
      transition: transform .16s ease, background .16s ease, border-color .16s ease;
    }

    .primary-button {
      background: var(--accent);
      color: #06130f;
    }

    .primary-button:hover {
      transform: translateY(-1px);
      background: var(--accent-strong);
    }

    .secondary-button {
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
    }

    .secondary-button:hover {
      transform: translateY(-1px);
      border-color: rgba(89, 195, 166, .55);
      background: #24313a;
    }

    .secondary-button:disabled {
      cursor: not-allowed;
      opacity: .48;
      transform: none;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      align-items: start;
    }

    .character-card {
      border: 1px solid var(--level-color, var(--line));
      border-radius: 8px;
      background: rgba(23, 28, 34, .92);
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--level-color, transparent) 16%, transparent), var(--shadow);
      overflow: hidden;
      transition: border-color .16s ease, transform .16s ease;
    }

    .character-card:hover {
      border-color: var(--level-color, rgba(89, 195, 166, .42));
      transform: translateY(-2px);
    }

    .character-card.dragging {
      opacity: .42;
      transform: scale(.985);
    }

    .character-card.drop-target {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(232, 193, 92, .12), var(--shadow);
    }

    .card-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 42px 42px;
      gap: 12px;
      align-items: center;
      padding: 18px;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(135deg, rgba(89, 195, 166, .2), rgba(178, 116, 255, .09) 54%, transparent),
        #202832;
    }

    .card-title {
      min-width: 0;
    }

    .card-title strong {
      display: block;
      overflow: hidden;
      color: var(--text);
      font-size: 19px;
      font-weight: 850;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .edit-button {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(232, 193, 92, .38);
      border-radius: 8px;
      background: rgba(232, 193, 92, .1);
      color: var(--gold);
      font-size: 18px;
    }

    .drag-button {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(232, 193, 92, .38);
      border-radius: 8px;
      background: rgba(232, 193, 92, .1);
      color: var(--gold);
      font-size: 18px;
      cursor: grab;
    }

    .drag-button:active {
      cursor: grabbing;
    }

    .drag-button:hover {
      border-color: rgba(232, 193, 92, .72);
      background: rgba(232, 193, 92, .16);
    }

    .edit-button:hover {
      border-color: rgba(232, 193, 92, .72);
      background: rgba(232, 193, 92, .16);
    }

    .card-facts {
      display: grid;
      gap: 9px;
      padding: 16px 18px 18px;
    }

    .fact {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 14px;
      min-height: 34px;
      border: 1px solid rgba(255, 255, 255, .06);
      border-radius: 8px;
      background: rgba(17, 22, 28, .46);
      padding: 8px 10px;
    }

    .fact:last-child {
      border-bottom: 1px solid rgba(255, 255, 255, .06);
    }

    .fact span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }

    .fact strong {
      color: var(--text);
      font-size: 14px;
      text-align: right;
    }

    .fact strong .clan-inline {
      justify-content: flex-end;
    }

    .clan-preview {
      min-height: 34px;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(255, 255, 255, .06);
      border-radius: 8px;
      background: rgba(17, 22, 28, .46);
      color: var(--muted);
      padding: 6px 9px;
      font-size: 12px;
      font-weight: 750;
    }

    .fact.highlight {
      border-color: rgba(89, 195, 166, .18);
      background: rgba(89, 195, 166, .08);
    }

    .empty-state {
      display: grid;
      place-items: center;
      min-height: 56vh;
      border: 1px dashed #34414f;
      border-radius: 8px;
      background: rgba(23, 28, 34, .58);
      text-align: center;
      padding: 36px 20px;
    }

    .placeholder-panel {
      display: grid;
      place-items: center;
      min-height: 42vh;
      border: 1px dashed #34414f;
      border-radius: 8px;
      background: rgba(23, 28, 34, .58);
      color: var(--muted);
      text-align: center;
      padding: 34px 20px;
    }

    .placeholder-panel strong {
      display: block;
      color: var(--text);
      font-size: 19px;
      margin-bottom: 6px;
    }

    .panel-toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      margin-bottom: 12px;
    }

    .routine-toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 14px;
      margin-bottom: 12px;
    }

    .quest-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 0;
      gap: 0;
      transition: grid-template-columns .28s ease, gap .28s ease;
    }

    .quest-layout.detail-open {
      grid-template-columns: minmax(320px, .95fr) minmax(360px, 1.05fr);
      gap: 14px;
    }

    .quest-list {
      display: grid;
      gap: 10px;
      align-content: start;
      min-width: 0;
    }

    .quest-card {
      display: grid;
      gap: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(23, 28, 34, .9);
      overflow: hidden;
      transition: border-color .16s ease, background .16s ease;
    }

    .quest-card.active,
    .quest-card:hover {
      border-color: rgba(89, 195, 166, .48);
      background: rgba(31, 38, 48, .94);
    }

    .quest-card-main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 38px 38px;
      align-items: center;
      gap: 8px;
      width: 100%;
      background: transparent;
      color: var(--text);
      padding: 12px;
      text-align: left;
    }

    .quest-card-main strong {
      overflow: hidden;
      font-size: 15px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .quest-card-main span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 750;
    }

    .quest-toggle,
    .quest-menu-button,
    .copy-button {
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(17, 22, 28, .72);
      color: var(--text);
      font-weight: 850;
    }

    .quest-toggle,
    .quest-menu-button {
      width: 34px;
      height: 34px;
    }

    .quest-toggle:hover,
    .quest-menu-button:hover,
    .copy-button:hover {
      border-color: rgba(89, 195, 166, .55);
      background: rgba(89, 195, 166, .08);
    }

    .quest-roster {
      display: none;
      gap: 8px;
      border-top: 1px solid var(--line);
      padding: 10px 12px 12px;
    }

    .quest-card.expanded .quest-roster {
      display: grid;
    }

    .quest-character {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(255, 255, 255, .06);
      border-radius: 8px;
      background: rgba(17, 22, 28, .48);
      padding: 9px;
    }

    .quest-character button {
      min-height: 32px;
      border-radius: 8px;
      padding: 0 10px;
      font-size: 12px;
      font-weight: 800;
    }

    .quest-character-name {
      min-width: 0;
    }

    .quest-character-name strong,
    .quest-character-name span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .quest-character-name span {
      color: var(--muted);
      font-size: 11px;
    }

    .quest-character-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 6px;
    }

    .quest-detail {
      min-width: 0;
      max-height: calc(100vh - 108px);
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(23, 28, 34, .9);
      opacity: 0;
      transform: translateX(14px);
      pointer-events: none;
      transition: opacity .24s ease, transform .24s ease;
    }

    .quest-layout.detail-open .quest-detail {
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
    }

    .quest-detail-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      background: #202832;
      padding: 14px;
    }

    .quest-detail-header h2 {
      margin: 0;
      font-size: 18px;
    }

    .quest-detail-header span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .quest-sections {
      display: grid;
      gap: 12px;
      padding: 14px;
    }

    .quest-section {
      display: grid;
      gap: 10px;
      border: 1px solid rgba(255, 255, 255, .07);
      border-radius: 8px;
      background: rgba(17, 22, 28, .5);
      padding: 12px;
    }

    .quest-section label {
      display: flex;
      align-items: center;
      gap: 9px;
      font-weight: 850;
    }

    .quest-section p {
      margin: 0;
      color: #d4dde7;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .coord-list {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .coord-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid rgba(89, 195, 166, .46);
      border-radius: 999px;
      background: rgba(89, 195, 166, .12);
      color: var(--accent-strong);
      padding: 4px 5px 4px 9px;
      font-size: 12px;
      font-weight: 850;
    }

    .copy-button {
      width: 24px;
      height: 24px;
      border-radius: 999px;
      font-size: 12px;
    }

    .quest-section-editor {
      display: grid;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(17, 22, 28, .46);
      padding: 12px;
    }

    .coord-editor {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
    }

    .coord-editor-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .coord-editor-list button {
      border-radius: 999px;
      border: 1px solid rgba(89, 195, 166, .35);
      background: rgba(89, 195, 166, .1);
      color: var(--accent-strong);
      padding: 5px 8px;
      font-size: 12px;
      font-weight: 800;
    }

    .toggle-line {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
    }

    .routine-sections {
      display: grid;
      gap: 18px;
    }

    .routine-section {
      display: grid;
      gap: 12px;
    }

    .routine-section-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 8px;
    }

    .routine-section-header h2 {
      margin: 0;
      font-size: 18px;
    }

    .routine-section-header span {
      color: var(--muted);
      font-size: 12px;
    }

    .routine-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 12px;
    }

    .task-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(23, 28, 34, .92);
      overflow: hidden;
    }

    .task-card.available {
      border-color: var(--danger);
      box-shadow: 0 0 0 2px rgba(238, 111, 117, .1);
    }

    .task-card header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border-bottom: 1px solid var(--line);
      background: #202832;
      padding: 12px;
    }

    .task-card h3 {
      margin: 0;
      font-size: 15px;
    }

    .task-heading {
      display: flex;
      align-items: baseline;
      gap: 8px;
      min-width: 0;
    }

    .task-heading h3,
    .task-heading span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .task-heading h3 {
      flex: 0 1 auto;
    }

    .task-heading span {
      flex: 1 1 auto;
    }

    .task-heading span,
    .task-card header > span {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .task-edit-button {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(232, 193, 92, .38);
      border-radius: 8px;
      background: rgba(232, 193, 92, .1);
      color: var(--gold);
      font-size: 15px;
    }

    .task-characters {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      padding: 12px;
    }

    .task-characters > .task-timer {
      grid-column: 1 / -1;
      margin-left: 0;
    }

    .task-character-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 5px;
      align-items: start;
      border: 1px solid rgba(255, 255, 255, .06);
      border-radius: 8px;
      background: rgba(17, 22, 28, .46);
      padding: 9px;
    }

    .task-character-row label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      font-size: 13px;
      font-weight: 800;
    }

    .task-character-row label span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .task-timer {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
      margin-left: 26px;
      text-align: left;
    }

    .routine-badge {
      display: inline-flex;
      align-items: center;
      width: max-content;
      margin-top: 8px;
      border: 1px solid rgba(238, 111, 117, .5);
      border-radius: 999px;
      background: rgba(238, 111, 117, .12);
      color: #ffb0b4;
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 850;
    }

    .routine-badge-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .checkbox-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(17, 22, 28, .46);
      padding: 10px;
    }

    .checkbox-grid label {
      display: grid;
      grid-template-columns: 18px minmax(0, 1fr);
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }

    .checkbox-grid input {
      justify-self: center;
      margin: 0;
    }

    .checkbox-grid span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .empty-state strong {
      display: block;
      font-size: 20px;
    }

    .empty-state span {
      display: block;
      max-width: 460px;
      margin-top: 8px;
      color: var(--muted);
      line-height: 1.55;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: none;
      place-items: center;
      background: rgba(5, 8, 11, .62);
      backdrop-filter: blur(10px);
      padding: 20px;
    }

    .modal-backdrop.open {
      display: grid;
    }

    .character-modal {
      width: min(620px, 100%);
      max-height: min(92vh, 820px);
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(90deg, rgba(89, 195, 166, .18), transparent 72%),
        #202832;
    }

    .modal-header strong {
      display: block;
      font-size: 20px;
    }

    .modal-header span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
    }

    .modal-form {
      display: grid;
      gap: 14px;
      padding: 18px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .field span {
      color: #c8dcf0;
      font-size: 12px;
      font-weight: 650;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--input);
      color: var(--text);
      outline: none;
      padding: 12px;
      transition: border-color .16s ease, box-shadow .16s ease;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(89, 195, 166, .12);
    }

    .field textarea {
      min-height: 96px;
      resize: vertical;
      line-height: 1.5;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .form-grid.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .modal-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding-top: 4px;
    }

    .modal-actions > button {
      flex: 1 1 138px;
      min-height: 44px;
    }

    #questSectionEditors {
      display: grid;
      gap: 12px;
    }

    .ghost-button,
    .danger-button {
      min-height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      padding: 0 14px;
      font-weight: 780;
    }

    .ghost-button {
      border: 1px solid var(--line);
      background: transparent;
      color: var(--text);
    }

    .ghost-button:hover {
      border-color: rgba(89, 195, 166, .55);
      background: rgba(89, 195, 166, .08);
    }

    .danger-button {
      background: rgba(238, 111, 117, .12);
      color: #ff9ca0;
    }

    .danger-button:hover {
      background: rgba(238, 111, 117, .2);
    }

    @media (max-width: 860px) {
      .app,
      .app.sidebar-collapsed {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: relative;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .resize-handle {
        display: none;
      }

      .app.sidebar-collapsed .sidebar {
        height: 126px;
      }

      .character-list {
        max-height: 240px;
      }

      .topbar {
        flex-direction: column;
      }

      main {
        padding: 22px 16px 30px;
      }
    }

    @media (max-width: 620px) {
      .modal-actions,
      .form-grid,
      .form-grid.three,
      .sidebar-action-pair,
      .json-actions {
        grid-template-columns: 1fr;
      }

      .cards-grid {
        grid-template-columns: 1fr;
      }

      .task-characters {
        grid-template-columns: 1fr;
      }

      .quest-layout,
      .quest-layout.detail-open {
        grid-template-columns: 1fr;
      }

      .quest-detail {
        max-height: none;
      }

      .quest-card-main,
      .quest-character,
      .coord-editor {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <aside class="sidebar" aria-label="Personagens">
      <div class="resize-handle" id="resizeHandle" aria-hidden="true"></div>
      <div class="brand-row">
        <div class="crest" aria-hidden="true">OPxG</div>
        <div class="brand-copy">
          <strong>Organização PxG</strong>
          <span>PokeXGames</span>
        </div>
        <button class="icon-button sidebar-toggle" id="toggleSidebar" type="button" aria-label="Recolher menu" title="Recolher menu">
          <span class="collapse-icon" aria-hidden="true">‹</span>
        </button>
      </div>

      <nav class="character-list" id="characterList" aria-label="Lista de personagens"></nav>

      <div class="sidebar-actions">
        <div class="sidebar-action-pair">
          <button class="primary-button" id="addCharacterButton" type="button">
            <span aria-hidden="true">+</span>
            <span>Adicionar</span>
          </button>
          <button class="secondary-button" id="editSelectedButton" type="button">
            <span aria-hidden="true">✎</span>
            <span>Editar</span>
          </button>
        </div>
        <div class="json-actions">
          <button class="secondary-button" id="exportJsonButton" type="button">Exportar JSON</button>
          <button class="secondary-button" id="importJsonButton" type="button">Importar JSON</button>
        </div>
        <input id="importJsonInput" type="file" accept="application/json,.json" hidden>
      </div>
    </aside>

    <main>
      <nav class="tabs" aria-label="Seções do painel">
        <button class="tab-button active" type="button" data-tab="characters">Personagens</button>
        <button class="tab-button" type="button" data-tab="routine">Rotina</button>
        <button class="tab-button" type="button" data-tab="quests">Quests</button>
      </nav>

      <section class="tab-panel active" id="charactersPanel" data-panel="characters" aria-label="Personagens">
        <div class="cards-grid" id="cardsGrid" aria-label="Cards dos personagens"></div>
      </section>

      <section class="tab-panel" data-panel="routine" aria-label="Rotina">
        <div class="routine-toolbar">
          <button class="primary-button" id="addRoutineTaskButton" type="button">
            <span aria-hidden="true">+</span>
            <span>Adicionar Tarefa</span>
          </button>
        </div>
        <div class="routine-sections" id="routineSections"></div>
      </section>

      <section class="tab-panel" data-panel="quests" aria-label="Quests">
        <div class="panel-toolbar">
          <button class="primary-button" id="addQuestButton" type="button">
            <span aria-hidden="true">+</span>
            <span>Adicionar Quest</span>
          </button>
        </div>
        <div class="quest-layout" id="questLayout">
          <div class="quest-list" id="questList" aria-label="Lista de quests"></div>
          <aside class="quest-detail" id="questDetail" aria-label="Detalhes da quest"></aside>
        </div>
      </section>
    </main>
  </div>

  <div class="modal-backdrop" id="characterModalBackdrop" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="character-modal">
      <div class="modal-header">
        <div>
          <strong id="modalTitle">Adicionar personagem</strong>
          <span>Ficha crua para consulta no organizador PxG</span>
        </div>
        <button class="icon-button" id="closeModalButton" type="button" aria-label="Fechar janela" title="Fechar janela">×</button>
      </div>

      <form class="modal-form" id="characterForm">
        <label class="field">
          <span>Nome do personagem</span>
          <input id="characterName" type="text" autocomplete="off" maxlength="40" required>
        </label>

        <div class="form-grid three">
          <label class="field">
            <span>Clã</span>
            <select id="characterClan" required></select>
            <div class="clan-preview" id="clanPreview"></div>
          </label>
          <label class="field">
            <span>Nível do personagem</span>
            <input id="characterLevel" type="number" min="1" max="625" step="1" required>
          </label>
          <label class="field">
            <span>Nível NW</span>
            <input id="nwLevel" type="number" min="1" max="100" step="1">
          </label>
        </div>

        <div class="form-grid three">
          <label class="field">
            <span>Profissão</span>
            <select id="profession"></select>
          </label>
          <label class="field">
            <span>Especialização</span>
            <select id="specialization"></select>
          </label>
          <label class="field">
            <span>Nível de profissão</span>
            <input id="professionLevel" type="number" min="1" max="120" step="1">
          </label>
        </div>

        <div class="modal-actions">
          <button class="ghost-button" id="cancelModalButton" type="button">Cancelar</button>
          <button class="danger-button" id="deleteFromModalButton" type="button">Remover</button>
          <button class="primary-button" type="submit">Salvar personagem</button>
        </div>
      </form>
    </div>
  </div>

  <template id="emptyTemplate">
    <div class="empty-state">
      <div>
        <strong>Nenhum personagem criado ainda</strong>
        <span>Use o botão de adicionar para criar o primeiro personagem do seu organizador PxG.</span>
      </div>
    </div>
  </template>

  <div class="modal-backdrop" id="taskModalBackdrop" role="dialog" aria-modal="true" aria-labelledby="taskModalTitle">
    <div class="character-modal">
      <div class="modal-header">
        <div>
          <strong id="taskModalTitle">Adicionar Tarefa</strong>
          <span>Configuração de rotina por personagem</span>
        </div>
        <button class="icon-button" id="closeTaskModalButton" type="button" aria-label="Fechar janela" title="Fechar janela">×</button>
      </div>

      <form class="modal-form" id="taskForm">
        <div class="form-grid">
          <label class="field">
            <span>Nome da tarefa</span>
            <input id="taskName" type="text" maxlength="60" required>
          </label>
          <label class="field">
            <span>Tipo</span>
            <select id="taskKind" required>
              <option value="custom">Personalizada</option>
              <option value="daily">Diária</option>
              <option value="weekly">Semanal</option>
              <option value="monthly">Mensal</option>
            </select>
          </label>
        </div>

        <div class="form-grid three">
          <label class="field">
            <span>Nível mínimo</span>
            <input id="taskMinLevel" type="number" min="1" max="625" step="1" placeholder="1">
          </label>
          <label class="field">
            <span>Nível NW mínimo</span>
            <input id="taskMinNwLevel" type="number" min="1" max="100" step="1" placeholder="Opcional">
          </label>
          <div class="field">
            <span>Exibição</span>
            <label class="toggle-line" for="taskShowOnCharacters">
              <input id="taskShowOnCharacters" type="checkbox">
              <span>Mostrar quando estiver livre na aba Personagens</span>
            </label>
          </div>
        </div>

        <div class="form-grid" id="taskDurationRow">
          <label class="field">
            <span>Dias para reset</span>
            <input id="taskDurationDays" type="number" min="0" max="365" step="1" placeholder="0">
          </label>
          <label class="field">
            <span>Horas para reset</span>
            <input id="taskDurationHours" type="number" min="0" max="23" step="1" placeholder="0">
          </label>
        </div>

        <label class="field">
          <span>Habilitar por profissão</span>
          <div class="checkbox-grid" id="taskProfessionGrid"></div>
        </label>

        <div class="modal-actions">
          <button class="ghost-button" id="cancelTaskModalButton" type="button">Cancelar</button>
          <button class="danger-button" id="deleteTaskButton" type="button">Remover</button>
          <button class="primary-button" type="submit">Salvar tarefa</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-backdrop" id="questModalBackdrop" role="dialog" aria-modal="true" aria-labelledby="questModalTitle">
    <div class="character-modal">
      <div class="modal-header">
        <div>
          <strong id="questModalTitle">Adicionar Quest</strong>
          <span>Spoiler em seções, coordenadas e requisitos</span>
        </div>
        <button class="icon-button" id="closeQuestModalButton" type="button" aria-label="Fechar janela" title="Fechar janela">×</button>
      </div>

      <form class="modal-form" id="questForm">
        <label class="field">
          <span>Nome da quest</span>
          <input id="questName" type="text" maxlength="80" required>
        </label>

        <div class="form-grid">
          <label class="field">
            <span>Nível mínimo</span>
            <input id="questMinLevel" type="number" min="1" max="625" step="1" placeholder="1">
          </label>
          <label class="field">
            <span>Nível NW mínimo</span>
            <input id="questMinNwLevel" type="number" min="1" max="100" step="1" placeholder="Opcional">
          </label>
        </div>

        <div class="field">
          <span>Seções do spoiler</span>
          <div id="questSectionEditors"></div>
        </div>

        <button class="secondary-button" id="addQuestSectionButton" type="button">Adicionar seção</button>

        <div class="modal-actions">
          <button class="ghost-button" id="cancelQuestModalButton" type="button">Cancelar</button>
          <button class="danger-button" id="deleteQuestButton" type="button">Remover</button>
          <button class="secondary-button" id="finishQuestEditButton" type="button">Finalizar quest</button>
          <button class="primary-button" type="submit">Salvar quest</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "character-organizer:v3";
    const PREVIOUS_STORAGE_KEY = "character-organizer:v2";
