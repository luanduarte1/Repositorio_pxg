<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Organizador de Personagens</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101317;
      --panel: #171c22;
      --panel-2: #1f2630;
      --text: #edf0f2;
      --muted: #9ba7b4;
      --line: #2b3440;
      --accent: #59c3a6;
      --accent-strong: #7ed9bf;
      --gold: #e8c15c;
      --danger: #ee6f75;
      --input: #11161c;
      --shadow: 0 18px 50px rgba(0, 0, 0, .28);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(120deg, rgba(89, 195, 166, .06), transparent 28%),
        linear-gradient(220deg, rgba(232, 193, 92, .07), transparent 26%),
        var(--bg);
      color: var(--text);
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      display: grid;
      grid-template-columns: 292px minmax(0, 1fr);
      min-height: 100vh;
      transition: grid-template-columns .22s ease;
    }

    .app.sidebar-collapsed {
      grid-template-columns: 76px minmax(0, 1fr);
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 18px;
      padding: 20px 16px;
      border-right: 1px solid var(--line);
      background: rgba(17, 22, 28, .96);
      backdrop-filter: blur(18px);
      overflow: hidden;
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 42px;
    }

    .crest {
      width: 44px;
      height: 42px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border: 1px solid rgba(232, 193, 92, .45);
      border-radius: 8px;
      background: #24210f;
      color: var(--gold);
      font-size: 12px;
      font-weight: 800;
    }

    .brand-copy {
      min-width: 0;
      transition: opacity .18s ease;
    }

    .brand-copy strong {
      display: block;
      white-space: nowrap;
      font-size: 15px;
    }

    .brand-copy span {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .icon-button {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
      color: var(--text);
      transition: transform .16s ease, border-color .16s ease, background .16s ease;
    }

    .icon-button:hover {
      transform: translateY(-1px);
      border-color: rgba(89, 195, 166, .55);
      background: #24313a;
    }

    .sidebar-toggle {
      margin-left: auto;
    }

    .app.sidebar-collapsed .sidebar-toggle .collapse-icon {
      transform: rotate(180deg);
    }

    .collapse-icon {
      transition: transform .2s ease;
    }

    .add-character {
      display: grid;
      grid-template-columns: 1fr 46px;
      gap: 8px;
      transition: opacity .18s ease;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .field span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .field input,
    .field textarea,
    .field select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--input);
      color: var(--text);
      outline: none;
      padding: 11px 12px;
      transition: border-color .16s ease, box-shadow .16s ease;
    }

    .field input:focus,
    .field textarea:focus,
    .field select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(89, 195, 166, .12);
    }

    .field textarea {
      min-height: 84px;
      resize: vertical;
      line-height: 1.45;
    }

    .primary-button {
      min-height: 44px;
      border-radius: 8px;
      background: var(--accent);
      color: #06130f;
      font-weight: 800;
      transition: transform .16s ease, background .16s ease;
    }

    .primary-button:hover {
      transform: translateY(-1px);
      background: var(--accent-strong);
    }

    .character-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
      overflow: auto;
      padding-right: 2px;
    }

    .nav-card {
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr) 30px;
      align-items: center;
      gap: 10px;
      min-height: 54px;
      width: 100%;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: var(--text);
      padding: 8px;
      text-align: left;
    }

    .nav-card-main {
      display: contents;
      color: inherit;
      text-align: inherit;
    }

    .nav-card:hover,
    .nav-card.active {
      border-color: var(--line);
      background: var(--panel-2);
    }

    .avatar {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, .1);
      background: #26303a;
      color: var(--gold);
      font-size: 18px;
      font-weight: 850;
    }

    .nav-text {
      min-width: 0;
      transition: opacity .18s ease;
    }

    .nav-text strong,
    .nav-text span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .nav-text strong {
      font-size: 13px;
    }

    .nav-text span {
      margin-top: 2px;
      color: var(--muted);
      font-size: 11px;
    }

    .remove-button {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border-radius: 7px;
      background: transparent;
      color: var(--muted);
    }

    .remove-button:hover {
      background: rgba(238, 111, 117, .12);
      color: var(--danger);
    }

    .app.sidebar-collapsed .brand-copy,
    .app.sidebar-collapsed .add-character,
    .app.sidebar-collapsed .nav-text,
    .app.sidebar-collapsed .remove-button {
      opacity: 0;
      pointer-events: none;
    }

    .app.sidebar-collapsed .brand-copy {
      display: none;
    }

    .app.sidebar-collapsed .brand-row {
      display: grid;
      justify-items: center;
      gap: 8px;
    }

    .app.sidebar-collapsed .sidebar-toggle {
      margin-left: 0;
    }

    .app.sidebar-collapsed .sidebar {
      padding-inline: 16px;
    }

    .app.sidebar-collapsed .nav-card {
      grid-template-columns: 38px;
      justify-content: center;
      padding: 8px 2px;
    }

    main {
      min-width: 0;
      padding: 28px;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 22px;
    }

    .topbar h1 {
      margin: 0;
      font-size: clamp(24px, 3vw, 38px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .topbar p {
      max-width: 680px;
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .stats-strip {
      display: grid;
      grid-template-columns: repeat(3, minmax(110px, 1fr));
      gap: 10px;
      min-width: min(420px, 100%);
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(31, 38, 48, .72);
      padding: 12px;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 750;
      text-transform: uppercase;
    }

    .stat strong {
      display: block;
      margin-top: 6px;
      color: var(--text);
      font-size: 22px;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      align-items: start;
    }

    .character-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(23, 28, 34, .92);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-banner {
      display: grid;
      grid-template-columns: 62px minmax(0, 1fr);
      gap: 13px;
      align-items: center;
      padding: 16px;
      background:
        linear-gradient(90deg, rgba(89, 195, 166, .18), transparent 72%),
        #202832;
      border-bottom: 1px solid var(--line);
    }

    .portrait {
      width: 62px;
      height: 62px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      border: 1px solid rgba(232, 193, 92, .5);
      background:
        linear-gradient(135deg, #222a33 0 48%, #2c3d3f 48% 100%);
      color: var(--gold);
      font-size: 26px;
      font-weight: 900;
    }

    .title-field {
      min-width: 0;
    }

    .title-field input {
      width: 100%;
      border: 0;
      border-bottom: 1px solid rgba(255, 255, 255, .12);
      background: transparent;
      color: var(--text);
      outline: none;
      padding: 2px 0 7px;
      font-size: 20px;
      font-weight: 850;
    }

    .title-field input:focus {
      border-color: var(--accent);
    }

    .title-field span {
      display: block;
      margin-top: 7px;
      color: var(--muted);
      font-size: 12px;
    }

    .card-body {
      display: grid;
      gap: 13px;
      padding: 16px;
    }

    .compact-row {
      display: grid;
      grid-template-columns: 1fr 94px;
      gap: 10px;
    }

    .actions-row {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding-top: 2px;
    }

    .ghost-button,
    .danger-button {
      min-height: 38px;
      border-radius: 8px;
      padding: 0 12px;
      font-weight: 780;
    }

    .ghost-button {
      border: 1px solid var(--line);
      background: transparent;
      color: var(--text);
    }

    .ghost-button:hover {
      border-color: rgba(89, 195, 166, .55);
      background: rgba(89, 195, 166, .08);
    }

    .danger-button {
      background: rgba(238, 111, 117, .12);
      color: #ff9ca0;
    }

    .danger-button:hover {
      background: rgba(238, 111, 117, .2);
    }

    .empty-state {
      display: grid;
      place-items: center;
      min-height: 56vh;
      border: 1px dashed #34414f;
      border-radius: 8px;
      background: rgba(23, 28, 34, .58);
      text-align: center;
      padding: 36px 20px;
    }

    .empty-state strong {
      display: block;
      font-size: 20px;
    }

    .empty-state span {
      display: block;
      max-width: 460px;
      margin-top: 8px;
      color: var(--muted);
      line-height: 1.55;
    }

    @media (max-width: 860px) {
      .app,
      .app.sidebar-collapsed {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: relative;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .app.sidebar-collapsed .sidebar {
        height: 126px;
      }

      .character-list {
        max-height: 240px;
      }

      .topbar {
        flex-direction: column;
      }

      main {
        padding: 22px 16px 30px;
      }
    }

    @media (max-width: 560px) {
      .add-character,
      .compact-row,
      .stats-strip {
        grid-template-columns: 1fr;
      }

      .cards-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <aside class="sidebar" aria-label="Personagens">
      <div class="brand-row">
        <div class="crest" aria-hidden="true">OPxG</div>
        <div class="brand-copy">
          <strong>Organização PxG</strong>
          <span>Organizador de personagens</span>
        </div>
        <button class="icon-button sidebar-toggle" id="toggleSidebar" type="button" aria-label="Recolher menu" title="Recolher menu">
          <span class="collapse-icon" aria-hidden="true">‹</span>
        </button>
      </div>

      <form class="add-character" id="addCharacterForm">
        <label class="field">
          <span>Novo personagem</span>
          <input id="newCharacterName" type="text" autocomplete="off" placeholder="Nome do personagem" maxlength="40" required>
        </label>
        <button class="primary-button" type="submit" aria-label="Adicionar personagem" title="Adicionar personagem">+</button>
      </form>

      <nav class="character-list" id="characterList" aria-label="Lista de personagens"></nav>
    </aside>

    <main>
      <section class="topbar" aria-label="Resumo">
        <div>
          <h1>Organizador de Personagens</h1>
          <p>Crie personagens, organize a lista lateral e edite os cards com classe, nível, origem, status e anotações importantes da mesa.</p>
        </div>
        <div class="stats-strip" aria-label="Indicadores">
          <div class="stat">
            <span>Total</span>
            <strong id="totalCharacters">0</strong>
          </div>
          <div class="stat">
            <span>Nível médio</span>
            <strong id="averageLevel">0</strong>
          </div>
          <div class="stat">
            <span>Ativos</span>
            <strong id="activeCharacters">0</strong>
          </div>
        </div>
      </section>

      <section class="cards-grid" id="cardsGrid" aria-label="Cards dos personagens"></section>
    </main>
  </div>

  <template id="emptyTemplate">
    <div class="empty-state">
      <div>
        <strong>Nenhum personagem criado ainda</strong>
        <span>Use o campo no menu lateral para adicionar o primeiro personagem ao seu organizador.</span>
      </div>
    </div>
  </template>

  <script>
    const STORAGE_KEY = "character-organizer:v1";
    const app = document.querySelector("#app");
    const form = document.querySelector("#addCharacterForm");
    const nameInput = document.querySelector("#newCharacterName");
    const list = document.querySelector("#characterList");
    const grid = document.querySelector("#cardsGrid");
    const totalCharacters = document.querySelector("#totalCharacters");
    const averageLevel = document.querySelector("#averageLevel");
    const activeCharacters = document.querySelector("#activeCharacters");
    const toggleSidebar = document.querySelector("#toggleSidebar");
    const emptyTemplate = document.querySelector("#emptyTemplate");

    const classOptions = ["Guerreiro", "Mago", "Patrulheiro", "Clérigo", "Ladino", "Bardo", "Druida", "Paladino", "Outro"];
    const statusOptions = ["Ativo", "Reserva", "Ferido", "Afastado"];

    let state = {
      collapsed: false,
      selectedId: null,
      characters: []
    };

    function loadState() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) return;

      try {
        const parsed = JSON.parse(saved);
        state = {
          collapsed: Boolean(parsed.collapsed),
          selectedId: parsed.selectedId || null,
          characters: Array.isArray(parsed.characters) ? parsed.characters : []
        };
      } catch {
        localStorage.removeItem(STORAGE_KEY);
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function createCharacter(name) {
      const now = Date.now();
      return {
        id: String(now),
        name,
        className: "Guerreiro",
        level: 1,
        origin: "",
        status: "Ativo",
        notes: "",
        createdAt: now
      };
    }

    function getInitials(name) {
      return name
        .trim()
        .split(/\s+/)
        .slice(0, 2)
        .map((part) => part[0] || "")
        .join("")
        .toUpperCase() || "?";
    }

    function updateCharacter(id, patch) {
      state.characters = state.characters.map((character) => {
        if (character.id !== id) return character;
        return { ...character, ...patch };
      });
      saveState();
      render();
    }

    function removeCharacter(id) {
      const character = state.characters.find((item) => item.id === id);
      const label = character ? character.name : "este personagem";
      if (!confirm(`Remover ${label}?`)) return;

      state.characters = state.characters.filter((item) => item.id !== id);
      if (state.selectedId === id) {
        state.selectedId = state.characters[0]?.id || null;
      }
      saveState();
      render();
    }

    function selectCharacter(id) {
      state.selectedId = id;
      saveState();
      render();
      document.querySelector(`[data-card-id="${id}"]`)?.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function renderList() {
      list.innerHTML = "";

      state.characters.forEach((character) => {
        const item = document.createElement("div");
        item.className = `nav-card${character.id === state.selectedId ? " active" : ""}`;
        item.title = character.name;

        const select = document.createElement("button");
        select.className = "nav-card-main";
        select.type = "button";
        select.setAttribute("aria-label", `Selecionar ${character.name}`);
        select.addEventListener("click", () => selectCharacter(character.id));

        const avatar = document.createElement("div");
        avatar.className = "avatar";
        avatar.setAttribute("aria-hidden", "true");
        avatar.textContent = getInitials(character.name);

        const text = document.createElement("div");
        text.className = "nav-text";
        text.innerHTML = `<strong></strong><span></span>`;
        text.querySelector("strong").textContent = character.name;
        text.querySelector("span").textContent = `${character.className} · Nível ${character.level || 1}`;

        const remove = document.createElement("button");
        remove.className = "remove-button";
        remove.type = "button";
        remove.title = "Remover personagem";
        remove.setAttribute("aria-label", `Remover ${character.name}`);
        remove.textContent = "×";
        remove.addEventListener("click", () => removeCharacter(character.id));

        select.append(avatar, text);
        item.append(select, remove);
        list.appendChild(item);
      });
    }

    function renderCards() {
      grid.innerHTML = "";

      if (!state.characters.length) {
        grid.appendChild(emptyTemplate.content.cloneNode(true));
        return;
      }

      state.characters.forEach((character) => {
        const card = document.createElement("article");
        card.className = "character-card";
        card.dataset.cardId = character.id;

        card.innerHTML = `
          <div class="card-banner">
            <div class="portrait" aria-hidden="true">${getInitials(character.name)}</div>
            <label class="title-field">
              <input type="text" value="" maxlength="40" aria-label="Nome do personagem">
              <span>Criado para a sessão</span>
            </label>
          </div>
          <div class="card-body">
            <div class="compact-row">
              <label class="field">
                <span>Classe</span>
                <select aria-label="Classe"></select>
              </label>
              <label class="field">
                <span>Nível</span>
                <input type="number" min="1" max="99" step="1" value="" aria-label="Nível">
              </label>
            </div>
            <label class="field">
              <span>Origem</span>
              <input type="text" value="" placeholder="Cidade, clã, reino..." maxlength="60" aria-label="Origem">
            </label>
            <label class="field">
              <span>Status</span>
              <select aria-label="Status"></select>
            </label>
            <label class="field">
              <span>Anotações</span>
              <textarea placeholder="Inventário, relações, objetivos, poderes, pendências..." aria-label="Anotações"></textarea>
            </label>
            <div class="actions-row">
              <button class="ghost-button" type="button">Selecionar</button>
              <button class="danger-button" type="button">Remover</button>
            </div>
          </div>
        `;

        const [nameField, levelField, originField] = card.querySelectorAll("input");
        const [classSelect, statusSelect] = card.querySelectorAll("select");
        const notesField = card.querySelector("textarea");
        const [selectButton, removeButton] = card.querySelectorAll(".actions-row button");

        nameField.value = character.name;
        levelField.value = character.level || 1;
        originField.value = character.origin || "";
        notesField.value = character.notes || "";

        classOptions.forEach((option) => {
          classSelect.add(new Option(option, option, false, option === character.className));
        });

        statusOptions.forEach((option) => {
          statusSelect.add(new Option(option, option, false, option === character.status));
        });

        nameField.addEventListener("change", () => updateCharacter(character.id, { name: nameField.value.trim() || "Sem nome" }));
        levelField.addEventListener("change", () => updateCharacter(character.id, { level: Number(levelField.value) || 1 }));
        originField.addEventListener("change", () => updateCharacter(character.id, { origin: originField.value.trim() }));
        classSelect.addEventListener("change", () => updateCharacter(character.id, { className: classSelect.value }));
        statusSelect.addEventListener("change", () => updateCharacter(character.id, { status: statusSelect.value }));
        notesField.addEventListener("change", () => updateCharacter(character.id, { notes: notesField.value.trim() }));
        selectButton.addEventListener("click", () => selectCharacter(character.id));
        removeButton.addEventListener("click", () => removeCharacter(character.id));

        grid.appendChild(card);
      });
    }

    function renderStats() {
      const total = state.characters.length;
      const active = state.characters.filter((character) => character.status === "Ativo").length;
      const levels = state.characters.map((character) => Number(character.level) || 1);
      const average = levels.length ? Math.round(levels.reduce((sum, level) => sum + level, 0) / levels.length) : 0;

      totalCharacters.textContent = total;
      activeCharacters.textContent = active;
      averageLevel.textContent = average;
    }

    function render() {
      app.classList.toggle("sidebar-collapsed", state.collapsed);
      toggleSidebar.setAttribute("aria-label", state.collapsed ? "Expandir menu" : "Recolher menu");
      toggleSidebar.title = state.collapsed ? "Expandir menu" : "Recolher menu";
      renderList();
      renderCards();
      renderStats();
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const name = nameInput.value.trim();
      if (!name) return;

      const character = createCharacter(name);
      state.characters.unshift(character);
      state.selectedId = character.id;
      nameInput.value = "";
      saveState();
      render();
    });

    toggleSidebar.addEventListener("click", () => {
      state.collapsed = !state.collapsed;
      saveState();
      render();
    });

    loadState();
    if (!state.selectedId && state.characters.length) {
      state.selectedId = state.characters[0].id;
    }
    render();
  </script>
</body>
</html>
