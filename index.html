<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Organização PxG</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101317;
      --panel: #171c22;
      --panel-2: #1f2630;
      --panel-3: #25323a;
      --text: #edf0f2;
      --muted: #9ba7b4;
      --line: #2b3440;
      --accent: #59c3a6;
      --accent-strong: #7ed9bf;
      --gold: #e8c15c;
      --danger: #ee6f75;
      --input: #11161c;
      --shadow: 0 22px 70px rgba(0, 0, 0, .34);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(120deg, rgba(89, 195, 166, .06), transparent 28%),
        linear-gradient(220deg, rgba(232, 193, 92, .07), transparent 26%),
        var(--bg);
      color: var(--text);
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      display: grid;
      grid-template-columns: 292px minmax(0, 1fr);
      min-height: 100vh;
      transition: grid-template-columns .22s ease;
    }

    .app.sidebar-collapsed {
      grid-template-columns: 76px minmax(0, 1fr);
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 18px;
      padding: 20px 16px;
      border-right: 1px solid var(--line);
      background: rgba(17, 22, 28, .96);
      backdrop-filter: blur(18px);
      overflow: hidden;
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 42px;
    }

    .crest {
      width: 44px;
      height: 42px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border: 1px solid rgba(232, 193, 92, .45);
      border-radius: 8px;
      background: #24210f;
      color: var(--gold);
      font-size: 12px;
      font-weight: 800;
    }

    .brand-copy {
      min-width: 0;
      transition: opacity .18s ease;
    }

    .brand-copy strong {
      display: block;
      white-space: nowrap;
      font-size: 15px;
    }

    .brand-copy span {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .icon-button {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
      color: var(--text);
      transition: transform .16s ease, border-color .16s ease, background .16s ease;
    }

    .icon-button:hover {
      transform: translateY(-1px);
      border-color: rgba(89, 195, 166, .55);
      background: #24313a;
    }

    .sidebar-toggle {
      margin-left: auto;
    }

    .app.sidebar-collapsed .sidebar-toggle .collapse-icon {
      transform: rotate(180deg);
    }

    .collapse-icon {
      transition: transform .2s ease;
    }

    .character-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
      overflow: auto;
      padding-right: 2px;
    }

    .nav-card {
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr) 30px;
      align-items: center;
      gap: 10px;
      min-height: 54px;
      width: 100%;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: var(--text);
      padding: 8px;
      text-align: left;
    }

    .nav-card-main {
      display: contents;
      color: inherit;
      text-align: inherit;
    }

    .nav-card:hover,
    .nav-card.active {
      border-color: var(--line);
      background: var(--panel-2);
    }

    .avatar {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, .1);
      background: #26303a;
      color: var(--gold);
      font-size: 18px;
      font-weight: 850;
    }

    .nav-text {
      min-width: 0;
      transition: opacity .18s ease;
    }

    .nav-text strong,
    .nav-text span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .nav-text strong {
      font-size: 13px;
    }

    .nav-text span {
      margin-top: 2px;
      color: var(--muted);
      font-size: 11px;
    }

    .remove-button {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border-radius: 7px;
      background: transparent;
      color: var(--muted);
    }

    .remove-button:hover {
      background: rgba(238, 111, 117, .12);
      color: var(--danger);
    }

    .app.sidebar-collapsed .brand-copy,
    .app.sidebar-collapsed .nav-text,
    .app.sidebar-collapsed .remove-button {
      opacity: 0;
      pointer-events: none;
    }

    .app.sidebar-collapsed .brand-copy {
      display: none;
    }

    .app.sidebar-collapsed .brand-row {
      display: grid;
      justify-items: center;
      gap: 8px;
    }

    .app.sidebar-collapsed .sidebar-toggle {
      margin-left: 0;
    }

    .app.sidebar-collapsed .sidebar {
      padding-inline: 16px;
    }

    .app.sidebar-collapsed .nav-card {
      grid-template-columns: 38px;
      justify-content: center;
      padding: 8px 2px;
    }

    main {
      min-width: 0;
      padding: 28px;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 22px;
    }

    .topbar h1 {
      margin: 0;
      font-size: clamp(24px, 3vw, 38px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .topbar p {
      max-width: 720px;
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .action-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(180px, 1fr));
      gap: 10px;
      min-width: min(440px, 100%);
    }

    .primary-button,
    .secondary-button {
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      border-radius: 8px;
      padding: 0 14px;
      font-weight: 800;
      transition: transform .16s ease, background .16s ease, border-color .16s ease;
    }

    .primary-button {
      background: var(--accent);
      color: #06130f;
    }

    .primary-button:hover {
      transform: translateY(-1px);
      background: var(--accent-strong);
    }

    .secondary-button {
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
    }

    .secondary-button:hover {
      transform: translateY(-1px);
      border-color: rgba(89, 195, 166, .55);
      background: #24313a;
    }

    .secondary-button:disabled {
      cursor: not-allowed;
      opacity: .48;
      transform: none;
    }

    .stats-strip {
      display: grid;
      grid-template-columns: repeat(3, minmax(110px, 1fr));
      gap: 10px;
      margin-bottom: 18px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(31, 38, 48, .72);
      padding: 12px;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 750;
      text-transform: uppercase;
    }

    .stat strong {
      display: block;
      margin-top: 6px;
      color: var(--text);
      font-size: 22px;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      align-items: start;
    }

    .character-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(23, 28, 34, .92);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 42px;
      gap: 12px;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(90deg, rgba(89, 195, 166, .16), transparent 72%),
        #202832;
    }

    .card-title {
      min-width: 0;
    }

    .card-title strong {
      display: block;
      overflow: hidden;
      color: var(--text);
      font-size: 19px;
      font-weight: 850;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .card-title span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .edit-button {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(232, 193, 92, .38);
      border-radius: 8px;
      background: rgba(232, 193, 92, .1);
      color: var(--gold);
      font-size: 18px;
    }

    .edit-button:hover {
      border-color: rgba(232, 193, 92, .72);
      background: rgba(232, 193, 92, .16);
    }

    .card-facts {
      display: grid;
      gap: 10px;
      padding: 15px 16px 16px;
    }

    .fact {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 14px;
      min-height: 26px;
      border-bottom: 1px solid rgba(255, 255, 255, .06);
      padding-bottom: 8px;
    }

    .fact:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .fact span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }

    .fact strong {
      color: var(--text);
      font-size: 14px;
      text-align: right;
    }

    .empty-state {
      display: grid;
      place-items: center;
      min-height: 56vh;
      border: 1px dashed #34414f;
      border-radius: 8px;
      background: rgba(23, 28, 34, .58);
      text-align: center;
      padding: 36px 20px;
    }

    .empty-state strong {
      display: block;
      font-size: 20px;
    }

    .empty-state span {
      display: block;
      max-width: 460px;
      margin-top: 8px;
      color: var(--muted);
      line-height: 1.55;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: none;
      place-items: center;
      background: rgba(5, 8, 11, .62);
      backdrop-filter: blur(10px);
      padding: 20px;
    }

    .modal-backdrop.open {
      display: grid;
    }

    .character-modal {
      width: min(620px, 100%);
      max-height: min(92vh, 820px);
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(90deg, rgba(89, 195, 166, .18), transparent 72%),
        #202832;
    }

    .modal-header strong {
      display: block;
      font-size: 20px;
    }

    .modal-header span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
    }

    .modal-form {
      display: grid;
      gap: 14px;
      padding: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .field span {
      color: #c8dcf0;
      font-size: 12px;
      font-weight: 650;
    }

    .field input,
    .field select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--input);
      color: var(--text);
      outline: none;
      padding: 12px;
      transition: border-color .16s ease, box-shadow .16s ease;
    }

    .field input:focus,
    .field select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(89, 195, 166, .12);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding-top: 4px;
    }

    .ghost-button,
    .danger-button {
      min-height: 40px;
      border-radius: 8px;
      padding: 0 14px;
      font-weight: 780;
    }

    .ghost-button {
      border: 1px solid var(--line);
      background: transparent;
      color: var(--text);
    }

    .ghost-button:hover {
      border-color: rgba(89, 195, 166, .55);
      background: rgba(89, 195, 166, .08);
    }

    .danger-button {
      background: rgba(238, 111, 117, .12);
      color: #ff9ca0;
    }

    .danger-button:hover {
      background: rgba(238, 111, 117, .2);
    }

    @media (max-width: 860px) {
      .app,
      .app.sidebar-collapsed {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: relative;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .app.sidebar-collapsed .sidebar {
        height: 126px;
      }

      .character-list {
        max-height: 240px;
      }

      .topbar {
        flex-direction: column;
      }

      main {
        padding: 22px 16px 30px;
      }
    }

    @media (max-width: 620px) {
      .action-row,
      .stats-strip,
      .form-grid {
        grid-template-columns: 1fr;
      }

      .cards-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <aside class="sidebar" aria-label="Personagens">
      <div class="brand-row">
        <div class="crest" aria-hidden="true">OPxG</div>
        <div class="brand-copy">
          <strong>Organização PxG</strong>
          <span>PokeXGames</span>
        </div>
        <button class="icon-button sidebar-toggle" id="toggleSidebar" type="button" aria-label="Recolher menu" title="Recolher menu">
          <span class="collapse-icon" aria-hidden="true">‹</span>
        </button>
      </div>

      <nav class="character-list" id="characterList" aria-label="Lista de personagens"></nav>
    </aside>

    <main>
      <section class="topbar" aria-label="Resumo">
        <div>
          <h1>Organizador de Personagens PxG</h1>
          <p>Organize personagens de PokeXGames com clã, níveis, profissão e especialização para consultar tudo rapidamente durante o jogo.</p>
        </div>
        <div class="action-row">
          <button class="primary-button" id="addCharacterButton" type="button">
            <span aria-hidden="true">+</span>
            <span>Adicionar novo personagem</span>
          </button>
          <button class="secondary-button" id="editSelectedButton" type="button">
            <span aria-hidden="true">✎</span>
            <span>Editar personagem existente</span>
          </button>
        </div>
      </section>

      <section class="stats-strip" aria-label="Indicadores">
        <div class="stat">
          <span>Total</span>
          <strong id="totalCharacters">0</strong>
        </div>
        <div class="stat">
          <span>Nível médio</span>
          <strong id="averageLevel">0</strong>
        </div>
        <div class="stat">
          <span>Profissão média</span>
          <strong id="averageProfessionLevel">0</strong>
        </div>
      </section>

      <section class="cards-grid" id="cardsGrid" aria-label="Cards dos personagens"></section>
    </main>
  </div>

  <div class="modal-backdrop" id="characterModalBackdrop" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="character-modal">
      <div class="modal-header">
        <div>
          <strong id="modalTitle">Adicionar personagem</strong>
          <span>Ficha crua para consulta no organizador PxG</span>
        </div>
        <button class="icon-button" id="closeModalButton" type="button" aria-label="Fechar janela" title="Fechar janela">×</button>
      </div>

      <form class="modal-form" id="characterForm">
        <label class="field">
          <span>Nome do personagem</span>
          <input id="characterName" type="text" autocomplete="off" maxlength="40" required>
        </label>

        <div class="form-grid">
          <label class="field">
            <span>Clã</span>
            <select id="characterClan" required></select>
          </label>
          <label class="field">
            <span>Nível do personagem</span>
            <input id="characterLevel" type="number" min="1" max="625" step="1" required>
          </label>
        </div>

        <div class="form-grid">
          <label class="field">
            <span>Nível Pokémon</span>
            <input id="pokemonLevel" type="number" min="1" max="100" step="1" required>
          </label>
          <label class="field">
            <span>Nível de profissão</span>
            <input id="professionLevel" type="number" min="1" max="120" step="1" required>
          </label>
        </div>

        <div class="form-grid">
          <label class="field">
            <span>Profissão</span>
            <select id="profession" required></select>
          </label>
          <label class="field">
            <span>Especialização</span>
            <select id="specialization" required></select>
          </label>
        </div>

        <div class="modal-actions">
          <button class="ghost-button" id="cancelModalButton" type="button">Cancelar</button>
          <button class="danger-button" id="deleteFromModalButton" type="button">Remover</button>
          <button class="primary-button" type="submit">Salvar personagem</button>
        </div>
      </form>
    </div>
  </div>

  <template id="emptyTemplate">
    <div class="empty-state">
      <div>
        <strong>Nenhum personagem criado ainda</strong>
        <span>Use o botão de adicionar para criar o primeiro personagem do seu organizador PxG.</span>
      </div>
    </div>
  </template>

  <script>
    const STORAGE_KEY = "character-organizer:v2";
    const LEGACY_STORAGE_KEY = "character-organizer:v1";
    const app = document.querySelector("#app");
    const list = document.querySelector("#characterList");
    const grid = document.querySelector("#cardsGrid");
    const totalCharacters = document.querySelector("#totalCharacters");
    const averageLevel = document.querySelector("#averageLevel");
    const averageProfessionLevel = document.querySelector("#averageProfessionLevel");
    const toggleSidebar = document.querySelector("#toggleSidebar");
    const emptyTemplate = document.querySelector("#emptyTemplate");
    const addCharacterButton = document.querySelector("#addCharacterButton");
    const editSelectedButton = document.querySelector("#editSelectedButton");
    const modalBackdrop = document.querySelector("#characterModalBackdrop");
    const modalTitle = document.querySelector("#modalTitle");
    const closeModalButton = document.querySelector("#closeModalButton");
    const cancelModalButton = document.querySelector("#cancelModalButton");
    const deleteFromModalButton = document.querySelector("#deleteFromModalButton");
    const characterForm = document.querySelector("#characterForm");
    const characterName = document.querySelector("#characterName");
    const characterClan = document.querySelector("#characterClan");
    const characterLevel = document.querySelector("#characterLevel");
    const pokemonLevel = document.querySelector("#pokemonLevel");
    const profession = document.querySelector("#profession");
    const specialization = document.querySelector("#specialization");
    const professionLevel = document.querySelector("#professionLevel");

    const clanOptions = ["Volcanic", "Naturia", "Gardestrike", "Malefic", "Iron Hard", "Wingeon", "Raibolt", "Psycraft", "Orebound", "Seavell"];
    const professionOptions = ["Engenheiro", "Professor", "Estilista", "Aventureiro"];
    const specializationOptions = {
      Engenheiro: ["Mecânico", "Hacker", "Sem especialização"],
      Professor: ["Alquimista", "Acadêmico", "Sem especialização"],
      Estilista: ["Decorador", "Designer", "Sem especialização"],
      Aventureiro: ["Cozinheiro", "Arqueólogo", "Sem especialização"]
    };

    let state = {
      collapsed: false,
      selectedId: null,
      characters: []
    };

    let editingId = null;

    function clampNumber(value, min, max) {
      const number = Number(value);
      if (!Number.isFinite(number)) return min;
      return Math.min(max, Math.max(min, Math.round(number)));
    }

    function normalizeCharacter(character) {
      const professionName = professionOptions.includes(character.profession) ? character.profession : "Aventureiro";
      const availableSpecs = specializationOptions[professionName];
      const spec = availableSpecs.includes(character.specialization) ? character.specialization : "Sem especialização";

      return {
        id: character.id || String(Date.now()),
        name: character.name || "Sem nome",
        clan: clanOptions.includes(character.clan) ? character.clan : character.className && clanOptions.includes(character.className) ? character.className : "Naturia",
        characterLevel: clampNumber(character.characterLevel || character.level || 1, 1, 625),
        pokemonLevel: clampNumber(character.pokemonLevel || 1, 1, 100),
        profession: professionName,
        specialization: spec,
        professionLevel: clampNumber(character.professionLevel || 1, 1, 120),
        createdAt: character.createdAt || Date.now()
      };
    }

    function loadState() {
      const saved = localStorage.getItem(STORAGE_KEY) || localStorage.getItem(LEGACY_STORAGE_KEY);
      if (!saved) return;

      try {
        const parsed = JSON.parse(saved);
        state = {
          collapsed: Boolean(parsed.collapsed),
          selectedId: parsed.selectedId || null,
          characters: Array.isArray(parsed.characters) ? parsed.characters.map(normalizeCharacter) : []
        };
      } catch {
        localStorage.removeItem(STORAGE_KEY);
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function getInitials(name) {
      return name
        .trim()
        .split(/\s+/)
        .slice(0, 2)
        .map((part) => part[0] || "")
        .join("")
        .toUpperCase() || "?";
    }

    function createCharacterFromForm(id = String(Date.now())) {
      return normalizeCharacter({
        id,
        name: characterName.value.trim() || "Sem nome",
        clan: characterClan.value,
        characterLevel: characterLevel.value,
        pokemonLevel: pokemonLevel.value,
        profession: profession.value,
        specialization: specialization.value,
        professionLevel: professionLevel.value,
        createdAt: state.characters.find((character) => character.id === id)?.createdAt || Date.now()
      });
    }

    function setSelectOptions(select, options, selectedValue) {
      select.innerHTML = "";
      options.forEach((option) => {
        select.add(new Option(option, option, false, option === selectedValue));
      });
    }

    function refreshSpecializations(selectedValue) {
      const options = specializationOptions[profession.value] || [];
      const nextSelected = options.includes(selectedValue) ? selectedValue : "Sem especialização";
      setSelectOptions(specialization, options, nextSelected);
    }

    function openModal(character = null) {
      editingId = character?.id || null;
      modalTitle.textContent = editingId ? "Editar personagem" : "Adicionar personagem";
      deleteFromModalButton.style.display = editingId ? "inline-flex" : "none";

      const draft = normalizeCharacter(character || {});
      characterName.value = editingId ? draft.name : "";
      characterLevel.value = draft.characterLevel;
      pokemonLevel.value = draft.pokemonLevel;
      professionLevel.value = draft.professionLevel;
      setSelectOptions(characterClan, clanOptions, draft.clan);
      setSelectOptions(profession, professionOptions, draft.profession);
      refreshSpecializations(draft.specialization);

      modalBackdrop.classList.add("open");
      document.body.style.overflow = "hidden";
      characterName.focus();
    }

    function closeModal() {
      modalBackdrop.classList.remove("open");
      document.body.style.overflow = "";
      editingId = null;
      characterForm.reset();
    }

    function removeCharacter(id) {
      const character = state.characters.find((item) => item.id === id);
      const label = character ? character.name : "este personagem";
      if (!confirm(`Remover ${label}?`)) return;

      state.characters = state.characters.filter((item) => item.id !== id);
      if (state.selectedId === id) {
        state.selectedId = state.characters[0]?.id || null;
      }
      saveState();
      closeModal();
      render();
    }

    function selectCharacter(id) {
      state.selectedId = id;
      saveState();
      render();
      document.querySelector(`[data-card-id="${id}"]`)?.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function renderList() {
      list.innerHTML = "";

      state.characters.forEach((character) => {
        const item = document.createElement("div");
        item.className = `nav-card${character.id === state.selectedId ? " active" : ""}`;
        item.title = character.name;

        const select = document.createElement("button");
        select.className = "nav-card-main";
        select.type = "button";
        select.setAttribute("aria-label", `Selecionar ${character.name}`);
        select.addEventListener("click", () => selectCharacter(character.id));

        const avatar = document.createElement("div");
        avatar.className = "avatar";
        avatar.setAttribute("aria-hidden", "true");
        avatar.textContent = getInitials(character.name);

        const text = document.createElement("div");
        text.className = "nav-text";
        text.innerHTML = `<strong></strong><span></span>`;
        text.querySelector("strong").textContent = character.name;
        text.querySelector("span").textContent = `${character.clan} · Nv. ${character.characterLevel}`;

        const remove = document.createElement("button");
        remove.className = "remove-button";
        remove.type = "button";
        remove.title = "Remover personagem";
        remove.setAttribute("aria-label", `Remover ${character.name}`);
        remove.textContent = "×";
        remove.addEventListener("click", () => removeCharacter(character.id));

        select.append(avatar, text);
        item.append(select, remove);
        list.appendChild(item);
      });
    }

    function renderCards() {
      grid.innerHTML = "";

      if (!state.characters.length) {
        grid.appendChild(emptyTemplate.content.cloneNode(true));
        return;
      }

      state.characters.forEach((character) => {
        const card = document.createElement("article");
        card.className = "character-card";
        card.dataset.cardId = character.id;

        card.innerHTML = `
          <div class="card-header">
            <div class="card-title">
              <strong></strong>
              <span></span>
            </div>
            <button class="edit-button" type="button" aria-label="Editar personagem" title="Editar personagem">✎</button>
          </div>
          <div class="card-facts">
            <div class="fact"><span>Clã</span><strong data-field="clan"></strong></div>
            <div class="fact"><span>Nível personagem</span><strong data-field="characterLevel"></strong></div>
            <div class="fact"><span>Nível Pokémon</span><strong data-field="pokemonLevel"></strong></div>
            <div class="fact"><span>Profissão</span><strong data-field="profession"></strong></div>
            <div class="fact"><span>Especialização</span><strong data-field="specialization"></strong></div>
            <div class="fact"><span>Nível profissão</span><strong data-field="professionLevel"></strong></div>
          </div>
        `;

        card.querySelector(".card-title strong").textContent = character.name;
        card.querySelector(".card-title span").textContent = "Ficha PxG";
        card.querySelector('[data-field="clan"]').textContent = character.clan;
        card.querySelector('[data-field="characterLevel"]').textContent = character.characterLevel;
        card.querySelector('[data-field="pokemonLevel"]').textContent = character.pokemonLevel;
        card.querySelector('[data-field="profession"]').textContent = character.profession;
        card.querySelector('[data-field="specialization"]').textContent = character.specialization;
        card.querySelector('[data-field="professionLevel"]').textContent = character.professionLevel;
        card.querySelector(".edit-button").addEventListener("click", () => {
          state.selectedId = character.id;
          saveState();
          render();
          openModal(character);
        });

        grid.appendChild(card);
      });
    }

    function renderStats() {
      const total = state.characters.length;
      const characterLevels = state.characters.map((character) => Number(character.characterLevel) || 1);
      const professionLevels = state.characters.map((character) => Number(character.professionLevel) || 1);
      const levelAverage = characterLevels.length ? Math.round(characterLevels.reduce((sum, level) => sum + level, 0) / characterLevels.length) : 0;
      const professionAverage = professionLevels.length ? Math.round(professionLevels.reduce((sum, level) => sum + level, 0) / professionLevels.length) : 0;

      totalCharacters.textContent = total;
      averageLevel.textContent = levelAverage;
      averageProfessionLevel.textContent = professionAverage;
      editSelectedButton.disabled = !state.selectedId;
    }

    function render() {
      app.classList.toggle("sidebar-collapsed", state.collapsed);
      toggleSidebar.setAttribute("aria-label", state.collapsed ? "Expandir menu" : "Recolher menu");
      toggleSidebar.title = state.collapsed ? "Expandir menu" : "Recolher menu";
      renderList();
      renderCards();
      renderStats();
    }

    addCharacterButton.addEventListener("click", () => openModal());

    editSelectedButton.addEventListener("click", () => {
      const character = state.characters.find((item) => item.id === state.selectedId);
      if (character) openModal(character);
    });

    toggleSidebar.addEventListener("click", () => {
      state.collapsed = !state.collapsed;
      saveState();
      render();
    });

    profession.addEventListener("change", () => refreshSpecializations());

    closeModalButton.addEventListener("click", closeModal);
    cancelModalButton.addEventListener("click", closeModal);

    modalBackdrop.addEventListener("click", (event) => {
      if (event.target === modalBackdrop) closeModal();
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && modalBackdrop.classList.contains("open")) {
        closeModal();
      }
    });

    deleteFromModalButton.addEventListener("click", () => {
      if (editingId) removeCharacter(editingId);
    });

    characterForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const character = createCharacterFromForm(editingId || String(Date.now()));

      if (editingId) {
        state.characters = state.characters.map((item) => item.id === editingId ? character : item);
      } else {
        state.characters.unshift(character);
      }

      state.selectedId = character.id;
      saveState();
      closeModal();
      render();
    });

    loadState();
    if (!state.selectedId && state.characters.length) {
      state.selectedId = state.characters[0].id;
    }
    saveState();
    render();
  </script>
</body>
</html>
